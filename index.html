// Night sky dome - deep blue-black with a faint city-glow band near the
// horizon (like real light pollution over a skyline). Also reused as
// scene.environment so glass windows and metallic trim have something real

let nightSkyTex;
{

  const grad = ctx.createLinearGradient(0, 0, 0, 256);
  grad.addColorStop(0, '#02040c');
  grad.addColorStop(0.55, '#060a1c');
  grad.addColorStop(0.82, '#12224a');

// Small built-in orbit camera (no OrbitControls.js dependency - that file
// isn't reliably available from CDNs for a plain script tag anymore, so
// this avoids the external-file failure point entirely). Orbits around
// `lookAtTarget`, which can be smoothly animated toward a tapped building
// for a "fly over and land" feel instead of a hard cut.
let camDistance = 34, camTheta = 0.0, camPhi = 1.0;
let camDistanceGoal = camDistance;
let camThetaGoal = camTheta, camPhiGoal = camPhi;
let lookAtTarget = new THREE.Vector3(0, 3, 0);
let lookAtGoal = lookAtTarget.clone();

function updateCamera() {
  camPhi = Math.max(0.15, Math.min(1.5, camPhi));
  camDistance = Math.max(6, Math.min(160, camDistance));
  camera.position.x = lookAtTarget.x + camDistance * Math.sin(camPhi) * Math.sin(camTheta);
  camera.position.y = lookAtTarget.y + camDistance * Math.cos(camPhi);
  camera.position.z = lookAtTarget.z + camDistance * Math.sin(camPhi) * Math.cos(camTheta);
  camera.lookAt(lookAtTarget);
}

function stepCameraTowardGoal() {
  lookAtTarget.lerp(lookAtGoal, 0.06);
  camDistance += (camDistanceGoal - camDistance) * 0.06;
  // Rotation is also lerped every frame (not snapped on each touch event) so
  // orbiting stays silky even when touch events arrive in uneven bursts,
  // instead of the "go-stop-go-stop" jitter of applying raw deltas directly.
  camTheta += (camThetaGoal - camTheta) * 0.22;
  camPhi += (camPhiGoal - camPhi) * 0.22;
  updateCamera();
}

function flyToBuilding(b) {
  lookAtGoal.set(b.position.x, b.position.y, b.position.z);
  camDistanceGoal = Math.max(8, (b.height || 2.5) * 2 + 5);
}

function makeGeometry(key, s, h) {
  switch (key) {
    case 'sphere': return new THREE.SphereGeometry(1.15*s, 20, 16);
    case 'torusKnot': return new THREE.TorusKnotGeometry(0.75*s, 0.3*s, 100, 16);
    case 'cylinder': return new THREE.CylinderGeometry(1.05*s, 1.05*s, h, 20);
    case 'dodecahedron': return new THREE.DodecahedronGeometry(1.15*s);
    case 'icosahedron': return new THREE.IcosahedronGeometry(1.15*s);
    case 'cone': return new THREE.ConeGeometry(1.1*s, h, 20);
    default: return new THREE.BoxGeometry(2.1*s, h, 2.1*s);
  }
}

// Baked facade texture: window grid + 1-2 random accent-colored floor bands,
// painted onto a single canvas instead of dozens of individual window plane
// meshes. This is what gives GitCity-style buildings their "designed"
// texture (colored stripes, varied window states) instead of a flat tint,
// and it's much cheaper to render than one mesh per window.
function buildFacadeTexture(accentHex) {
  const texW = 192, texH = 384;
  const canvas = document.createElement('canvas');
  canvas.width = texW; canvas.height = texH;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#dfe6ee';
  ctx.fillRect(0, 0, texW, texH);

  // faint vertical panel seams
  ctx.strokeStyle = 'rgba(0,0,0,0.08)';
  const seams = 6;
  for (let i = 1; i < seams; i++) {
    ctx.beginPath(); ctx.moveTo(i * texW / seams, 0); ctx.lineTo(i * texW / seams, texH); ctx.stroke();
  }

  const rows = 20, cols = 8;
  const cellW = texW / cols, cellH = texH / rows;

  // faint horizontal floor divider lines - extra texture layer under the
  // window grid so facades read as stacked floors, not one flat surface
  ctx.strokeStyle = 'rgba(0,0,0,0.06)';
  for (let r = 1; r < rows; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * cellH); ctx.lineTo(texW, r * cellH); ctx.stroke();
  }

  const bandRows = new Set();
  const bandCount = 1 + Math.floor(Math.random() * 2);
  for (let i = 0; i < bandCount; i++) bandRows.add(Math.floor(Math.random() * rows));

  for (let r = 0; r < rows; r++) {
    const isBand = bandRows.has(r);
    for (let c = 0; c < cols; c++) {
      const pad = cellW * 0.22;
      const x = c * cellW + pad, y = r * cellH + cellH * 0.25;
      const wsz = cellW - 2 * pad, hsz = cellH * 0.5;
      if (isBand) {
        ctx.globalAlpha = 0.9;
        ctx.fillStyle = accentHex;
      } else {
        // Dim by default - most windows read as dark glass at rest, with a
        // small fraction lit blue-white, so the whole city looks moody
        // until a building is selected and its glow gets boosted.
        const lit = Math.random() > 0.72;
        ctx.globalAlpha = lit ? 0.95 : 0.6;
        ctx.fillStyle = lit ? '#bfe3ff' : '#141a2c';
      }
      ctx.fillRect(x, y, wsz, hsz);
      ctx.globalAlpha = 1;
    }
  }

  // grime/noise speckle - tiny dark specks scattered across the facade so
  // it reads as a weathered surface instead of a clean flat render
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = '#000000';
  for (let i = 0; i < 260; i++) {
    const sx = Math.random() * texW, sy = Math.random() * texH;
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }
  ctx.globalAlpha = 1;

  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

// Roof cap + rooftop greebles + base plinth. capScale/plinthScale let a
// tiered tower's cap match its (narrower) top tier while the plinth still
// matches its (wider) base tier.
function addRoofDetails(parent, key, plinthScale, capScale, h, accentColor) {
  if (key === 'box' || key === 'cylinder') {
    const capGeo = key === 'box'
      ? new THREE.BoxGeometry(2.1 * capScale * 1.1, 0.18, 2.1 * capScale * 1.1)
      : new THREE.CylinderGeometry(1.05 * capScale * 1.12, 1.05 * capScale * 1.12, 0.18, 20);
    const capMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(accentColor), emissive: new THREE.Color(accentColor),
      emissiveIntensity: 0.5, roughness: 0.4, metalness: 0.5,
    });
    const cap = new THREE.Mesh(capGeo, capMat);
    cap.position.y = h / 2 + 0.09;
    cap.castShadow = true;
    parent.add(cap);

    // Rooftop greebles - small AC unit + water-tank silhouettes, the kind of
    // clutter that reads as "real building" from a distance.
    const greebleMat = new THREE.MeshStandardMaterial({ color: 0x555560, roughness: 0.7, metalness: 0.3 });
    if (Math.random() > 0.4) {
      const acUnit = new THREE.Mesh(new THREE.BoxGeometry(0.35 * capScale, 0.22, 0.35 * capScale), greebleMat);
      acUnit.position.set(0.4 * capScale, h / 2 + 0.28, 0.3 * capScale);
      acUnit.castShadow = true;
      parent.add(acUnit);
    }
    if (Math.random() > 0.55) {
      const tank = new THREE.Mesh(new THREE.CylinderGeometry(0.16 * capScale, 0.16 * capScale, 0.4, 10), greebleMat);
      tank.position.set(-0.35 * capScale, h / 2 + 0.38, -0.25 * capScale);
      tank.castShadow = true;
      parent.add(tank);
    }
    if (Math.random() > 0.5) {
      const antenna = new THREE.Mesh(
        new THREE.CylinderGeometry(0.02, 0.02, 0.6 * capScale + 0.4, 6),
        new THREE.MeshStandardMaterial({ color: 0x888899, emissive: 0xff4444, emissiveIntensity: 0.3 })
      );
      antenna.position.y = h / 2 + 0.5 * capScale + 0.3;
      parent.add(antenna);
    }
  }

  const plinthGeo = new THREE.CylinderGeometry(1.4 * plinthScale + 0.3, 1.55 * plinthScale + 0.4, 0.22, 24);
  const plinthMat = new THREE.MeshStandardMaterial({ color: 0x14141c, roughness: 0.9 });
  const plinth = new THREE.Mesh(plinthGeo, plinthMat);
  plinth.position.y = -h / 2 - 0.1;
  plinth.receiveShadow = true;
  plinth.castShadow = true;
  parent.add(plinth);
}

// Soft additive glow sprite - cheap stand-in for real bloom postprocessing
// (which would need extra CDN files we're deliberately avoiding). Sits
// behind each building's point light and fakes a light-bleed halo.
const glowTexture = (() => {
  const c = document.createElement('canvas');
  c.width = 128; c.height = 128;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
  g.addColorStop(0, 'rgba(255,255,255,0.9)');
  g.addColorStop(0.4, 'rgba(255,255,255,0.25)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(c);
})();

function addGlowSprite(position, color, scale) {
  const mat = new THREE.SpriteMaterial({
    map: glowTexture, color: new THREE.Color(color),
    transparent: true, opacity: 0.55, depthWrite: false, blending: THREE.AdditiveBlending,
  });
  const sprite = new THREE.Sprite(mat);
  sprite.position.copy(position);
  sprite.scale.set(scale, scale, 1);
  scene.add(sprite);
  return sprite;
}

// Builds one building as a Group. Box/cylinder memories become a stepped,
// setback tower (2-3 tiers narrowing upward, wedding-cake style like real
// skyscrapers / GitCity's silhouettes) with a baked facade texture on every
// tier. Landmark shapes (sphere, cone, torusKnot, etc, driven by objects
// like "bicycle" or "tree") stay as single sculptural forms - they're meant
// to read as monuments, not office towers.
function buildBuildingGroup(b, h) {
  const group = new THREE.Group();
  const key = b.geometry, s = b.scale, accent = b.accent;
  const isTiered = (key === 'box' || key === 'cylinder');
  const materials = [];

  if (!isTiered) {
    const geo = makeGeometry(key, s, h);
    const mat = new THREE.MeshStandardMaterial({
      color: 0xdfe6ee, emissive: new THREE.Color(accent), emissiveIntensity: 0.4,
      metalness: 0.3, roughness: 0.45, envMapIntensity: 0.8,
    });
    materials.push(mat);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.userData = b;
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    group.add(mesh);
    clickable.push(mesh);
    addRoofDetails(group, key, s, s, h, accent);
    return { group, materials };
  }

  const tex = buildFacadeTexture(accent);
  const tierCount = h > 18 ? 3 : (h > 9 ? 2 : 1);
  const heightFracs = tierCount === 3 ? [0.46, 0.32, 0.22] : tierCount === 2 ? [0.62, 0.38] : [1.0];
  const widthFactor = 0.76;
  let cursorY = -h / 2;
  let topScale = s;

  for (let i = 0; i < tierCount; i++) {
    const tierH = h * heightFracs[i];
    const tierScale = s * Math.pow(widthFactor, i);
    topScale = tierScale;
    const geo = key === 'box'
      ? new THREE.BoxGeometry(2.1 * tierScale, tierH, 2.1 * tierScale)
      : new THREE.CylinderGeometry(1.05 * tierScale, 1.05 * tierScale, tierH, 20);
    const mat = new THREE.MeshStandardMaterial({
      map: tex, color: 0xffffff, emissive: new THREE.Color(accent), emissiveIntensity: 0.22,
      metalness: 0.25, roughness: 0.5, envMapIntensity: 0.8,
    });
    materials.push(mat);
    const tierMesh = new THREE.Mesh(geo, mat);
    tierMesh.position.y = cursorY + tierH / 2;
    tierMesh.userData = b;
    tierMesh.castShadow = true;
    tierMesh.receiveShadow = true;
    group.add(tierMesh);
    clickable.push(tierMesh);
    cursorY += tierH;
  }

  addRoofDetails(group, key, s, topScale, h, accent);
  return { group, materials };
}

const clickable = [];
const raycaster = new THREE.Raycaster();
const labelEl = document.getElementById('label');

const maxRadius = BUILDINGS.reduce((m, b) => Math.max(m, Math.hypot(b.position.x, b.position.z)), 0);
const OVERVIEW_DISTANCE = Math.max(24, maxRadius * 1.6 + 14);
camDistance = OVERVIEW_DISTANCE;
camDistanceGoal = OVERVIEW_DISTANCE;
updateCamera();

const buildingRegistry = {};

BUILDINGS.forEach(b => {
  const h = b.height || 2.5;
  const { group, materials } = buildBuildingGroup(b, h);
  group.position.set(b.position.x, b.position.y, b.position.z);
  group.userData = b;
  scene.add(group);

  // Small glowing marker light per building so the city glows at night
  const baseLightIntensity = 0.6;
  const glow = new THREE.PointLight(new THREE.Color(b.accent), baseLightIntensity, 6);
  glow.position.set(b.position.x, b.position.y + 1.5, b.position.z);
  scene.add(glow);
  const baseSpriteScale = Math.max(2.2, h * 0.9);
  const baseSpriteOpacity = 0.55;
  const sprite = addGlowSprite(glow.position, b.accent, baseSpriteScale);

  buildingRegistry[b.index] = {
    materials,
    baseEmissive: materials.map(m => m.emissiveIntensity),
    light: glow,
    baseLightIntensity,
    sprite,
    baseSpriteOpacity,
    baseSpriteScale,
  };
});

// Selecting a building boosts its own glow (facade emissive, point light,
// halo sprite) well above the resting city glow, then reverts the previous
// selection back to its dim resting state - so only the tapped building
// "lights up" instead of the whole skyline looking uniformly bright.
let selectedIndex = null;

function clearHighlight(idx) {
  const reg = buildingRegistry[idx];
  if (!reg) return;
  reg.materials.forEach((m, i) => { m.emissiveIntensity = reg.baseEmissive[i]; });
  reg.light.intensity = reg.baseLightIntensity;
  reg.sprite.material.opacity = reg.baseSpriteOpacity;
  reg.sprite.scale.set(reg.baseSpriteScale, reg.baseSpriteScale, 1);
}

function applyHighlight(idx) {
  const reg = buildingRegistry[idx];
  if (!reg) return;
  reg.materials.forEach((m, i) => { m.emissiveIntensity = reg.baseEmissive[i] + 1.1; });
  reg.light.intensity = reg.baseLightIntensity * 4.5;
  reg.sprite.material.opacity = 0.95;
  reg.sprite.scale.set(reg.baseSpriteScale * 1.6, reg.baseSpriteScale * 1.6, 1);
}

function setSelected(idx) {
  if (selectedIndex !== null && selectedIndex !== idx) clearHighlight(selectedIndex);
  selectedIndex = idx;
  if (idx !== null) applyHighlight(idx);
}

function showLabel(b) {
  const objs = (b.objects || []).join(', ');
  labelEl.innerHTML = '<b>' + b.emotion.toUpperCase() + '</b>' +
    (objs ? ' &middot; ' + objs : '') +
    (b.snippet ? '<br>' + b.snippet : '');
  labelEl.style.display = 'block';
}

function handlePick(clientX, clientY) {
  const mouse = new THREE.Vector2(
    (clientX / window.innerWidth) * 2 - 1,
    -(clientY / window.innerHeight) * 2 + 1
  );
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickable);
  if (hits.length > 0) {
    showLabel(hits[0].object.userData);
    flyToBuilding(hits[0].object.userData);
    setSelected(hits[0].object.userData.index);
  } else {
    labelEl.style.display = 'none';
    lookAtGoal.set(0, 3, 0);
    camDistanceGoal = OVERVIEW_DISTANCE;
    setSelected(null);
  }
}

let isDragging = false, dragMoved = false, lastX = 0, lastY = 0;

// touch-action: none stops the mobile browser from intercepting drag
// gestures for its own scroll/refresh handling, which is what was causing
// the "go-stop-go-stop" stutter - without this, touchmove events arrive in
// uneven throttled bursts instead of a smooth stream.
renderer.domElement.style.touchAction = 'none';

renderer.domElement.addEventListener('pointerdown', (e) => {
  isDragging = true;
  dragMoved = false;
  lastX = e.clientX;
  lastY = e.clientY;
});

renderer.domElement.addEventListener('pointermove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;
  camThetaGoal -= dx * 0.012;
  camPhiGoal -= dy * 0.012;
  camPhiGoal = Math.max(0.15, Math.min(1.5, camPhiGoal));
  lastX = e.clientX;
  lastY = e.clientY;
});

renderer.domElement.addEventListener('pointerup', (e) => {
  isDragging = false;
  if (!dragMoved) handlePick(e.clientX, e.clientY);
});

renderer.domElement.addEventListener('wheel', (e) => {
  camDistanceGoal = Math.max(6, Math.min(160, camDistanceGoal + e.deltaY * 0.03));
  camDistance = camDistanceGoal;
  updateCamera();
}, { passive: true });

let firstFrameRendered = false;
function animate() {
  requestAnimationFrame(animate);
  stepCameraTowardGoal();
  renderer.render(scene, camera);
  if (!firstFrameRendered) {
    firstFrameRendered = true;
    const el = document.getElementById('status');
    if (el) el.style.display = 'none';
  }
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

} catch (err) {
  const el = document.getElementById('status');
  el.className = 'error';
  el.style.display = 'block';
  el.textContent = 'BUILD ERROR: ' + (err && err.message ? err.message : err);
}
</script>
</body>
</html>
