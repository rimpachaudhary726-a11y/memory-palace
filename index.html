let isDragging = false, dragMoved = false, lastX = 0, lastY = 0;

// Tracks every finger currently down, keyed by pointerId, so we can tell a
// one-finger drag (orbit) apart from a two-finger pinch (zoom). The old
// code only ever remembered a single lastX/lastY, so a second finger
// touching down just stomped on the first one's tracking and there was no
// way to zoom on a touchscreen at all - wheel only fires for a mouse.
const activePointers = new Map();
let pinchStartDist = null;

function pointerDistance() {
  const pts = Array.from(activePointers.values());
  if (pts.length < 2) return null;
  const dx = pts[0].x - pts[1].x;
  const dy = pts[0].y - pts[1].y;
  return Math.hypot(dx, dy);
}

// touch-action: none stops the mobile browser from intercepting drag/pinch
// gestures for its own scroll/refresh/zoom handling, which is what was
// causing the "go-stop-go-stop" stutter and also blocks our own pinch
// handling below - without this, touchmove events arrive in uneven
// throttled bursts instead of a smooth stream.
renderer.domElement.style.touchAction = 'none';

renderer.domElement.addEventListener('pointerdown', (e) => {
  activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (activePointers.size === 1) {
    isDragging = true;
    dragMoved = false;
    lastX = e.clientX;
    lastY = e.clientY;
  } else {
    // A second finger just landed - switch out of single-finger orbit
    // mode and start tracking pinch distance instead.
    isDragging = false;
    pinchStartDist = pointerDistance();
  }
});

renderer.domElement.addEventListener('pointermove', (e) => {
  if (!activePointers.has(e.pointerId)) return;
  activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (activePointers.size >= 2) {
    const dist = pointerDistance();
    if (pinchStartDist !== null && dist !== null) {
      const delta = dist - pinchStartDist;
      // Fingers spreading apart (delta > 0) should zoom IN, so it
      // subtracts from camera distance.
      camDistanceGoal = Math.max(6, Math.min(320, camDistanceGoal - delta * 0.09));
    }
    pinchStartDist = dist;
    return;
  }

  if (!isDragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;
  camThetaGoal -= dx * 0.012;
  camPhiGoal -= dy * 0.012;
  camPhiGoal = flightMode ? Math.max(0.1, Math.min(3.05, camPhiGoal)) : Math.max(0.15, Math.min(1.5, camPhiGoal));
  lastX = e.clientX;
  lastY = e.clientY;
});

function releasePointer(e) {
  activePointers.delete(e.pointerId);
  if (activePointers.size >= 2) {
    // Still pinching with the remaining fingers - just re-anchor.
    pinchStartDist = pointerDistance();
    isDragging = false;
  } else if (activePointers.size === 1) {
    // Dropped from two fingers to one - resume orbiting from here instead
    // of jumping, using whichever finger is still down.
    const remaining = Array.from(activePointers.values())[0];
    lastX = remaining.x;
    lastY = remaining.y;
    isDragging = true;
    dragMoved = true; // avoid firing a tap-select right after a pinch
    pinchStartDist = null;
  } else {
    pinchStartDist = null;
    if (isDragging && !dragMoved) handlePick(e.clientX, e.clientY);
    isDragging = false;
  }
}

renderer.domElement.addEventListener('pointerup', releasePointer);
renderer.domElement.addEventListener('pointercancel', releasePointer);

renderer.domElement.addEventListener('wheel', (e) => {
  camDistanceGoal = Math.max(6, Math.min(320, camDistanceGoal + e.deltaY * 0.03));
  camDistance = camDistanceGoal;
  updateCamera();
}, { passive: true });

document.getElementById('dayNightBtn').addEventListener('click', () => setDayMode(!isDaytime));
setDayMode(false);

// Switches between the normal orbit/walk camera and a free-flight camera.
// Entering flight mode starts from wherever the camera currently is (no
// jarring teleport); leaving it drops the orbit target to the ground
// beneath the flight position so normal mode resumes somewhere sensible
// instead of snapping back to the city center.
function setFlightMode(on) {
  flightMode = on;
  const btn = document.getElementById('flightModeBtn');
  if (on) {
    flightPos.copy(camera.position);
    btn.innerHTML = '&#128694; Normal';
  } else {
    lookAtTarget.set(flightPos.x, Math.max(2, flightPos.y * 0.3), flightPos.z);
    lookAtGoal.copy(lookAtTarget);
    camDistance = 22;
    camDistanceGoal = 22;
    btn.innerHTML = '&#9992;&#65039; Fly';
  }
}
document.getElementById('flightModeBtn').addEventListener('click', () => setFlightMode(!flightMode));

// On-screen joystick - drags the knob within its base, and while held
// pans lookAtTarget/lookAtGoal (and so the whole camera rig) across the
// ground in the direction currently faced, giving a walk/drive feel
// alongside the existing orbit-and-tap-to-fly controls. Kept as its own
// pointer listeners on the joystick element so it never fights the
// canvas's own drag-to-orbit handling above.
const joystickEl = document.getElementById('joystick');
const joystickKnob = document.getElementById('joystickKnob');
let joystickVec = { x: 0, y: 0 };
let joystickPointerId = null;
const JOY_RADIUS = 40;

function setJoystickFromEvent(e) {
  const rect = joystickEl.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  let dx = e.clientX - cx;
  let dy = e.clientY - cy;
  const dist = Math.hypot(dx, dy);
  if (dist > JOY_RADIUS) {
    dx = (dx / dist) * JOY_RADIUS;
    dy = (dy / dist) * JOY_RADIUS;
  }
  joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
  joystickVec.x = dx / JOY_RADIUS;
  joystickVec.y = dy / JOY_RADIUS;
}

function resetJoystick() {
  joystickKnob.style.transform = 'translate(0px, 0px)';
  joystickVec.x = 0;
  joystickVec.y = 0;
  joystickPointerId = null;
}

joystickEl.addEventListener('pointerdown', (e) => {
  joystickPointerId = e.pointerId;
  joystickEl.setPointerCapture(e.pointerId);
  setJoystickFromEvent(e);
  e.stopPropagation();
});
joystickEl.addEventListener('pointermove', (e) => {
  if (e.pointerId !== joystickPointerId) return;
  setJoystickFromEvent(e);
  e.stopPropagation();
});
joystickEl.addEventListener('pointerup', (e) => {
  if (e.pointerId !== joystickPointerId) return;
  resetJoystick();
  e.stopPropagation();
});
joystickEl.addEventListener('pointercancel', resetJoystick);

// Altitude buttons - held-down state applied every frame in animate(), so
// they work identically whether in fly mode (moves flightPos.y directly)
// or normal mode (raises/lowers the orbit target, like a crane shot). This
// exists as a dedicated, unambiguous control because relying only on
// look-pitch + joystick-throttle to climb wasn't landing reliably.
let altUpHeld = false, altDownHeld = false;
const altUpBtn = document.getElementById('altUpBtn');
const altDownBtn = document.getElementById('altDownBtn');
altUpBtn.addEventListener('pointerdown', (e) => { altUpHeld = true; e.preventDefault(); });
altUpBtn.addEventListener('pointerup', () => { altUpHeld = false; });
altUpBtn.addEventListener('pointercancel', () => { altUpHeld = false; });
altUpBtn.addEventListener('pointerleave', () => { altUpHeld = false; });
altDownBtn.addEventListener('pointerdown', (e) => { altDownHeld = true; e.preventDefault(); });
altDownBtn.addEventListener('pointerup', () => { altDownHeld = false; });
altDownBtn.addEventListener('pointercancel', () => { altDownHeld = false; });
altDownBtn.addEventListener('pointerleave', () => { altDownHeld = false; });

// ---- MINIMAP: a small top-down plan view in the corner, Git City style -
// every building plotted as a dot (clamped to the disc edge if it's
// further out than the map's radius, so nothing just vanishes), a white
// heading arrow showing which way the camera is currently facing, and a
// fixed "N" compass label. Centered on lookAtTarget (the point the camera
// orbits/walks around) rather than world origin, so the map re-centers as
// you move instead of only being useful from the starting spot. ----
const minimapCanvas = document.getElementById('minimap');
const minimapCtx = minimapCanvas.getContext('2d');
const MM_SIZE = minimapCanvas.width;
const MM_R = MM_SIZE / 2 - 6;
const MM_WORLD_R = Math.max(maxRadius, worldEdge) + 26;

function drawMinimap() {
  const ctx = minimapCtx;
  ctx.clearRect(0, 0, MM_SIZE, MM_SIZE);
  const cx = MM_SIZE / 2, cy = MM_SIZE / 2;
  const scale = MM_R / MM_WORLD_R;
  const centerWX = lookAtTarget.x, centerWZ = lookAtTarget.z;

  BUILDINGS.forEach(b => {
    let dx = (b.position.x - centerWX) * scale;
    let dz = (b.position.z - centerWZ) * scale;
    const dist = Math.hypot(dx, dz);
    if (dist > MM_R) { const k = MM_R / dist; dx *= k; dz *= k; }
    ctx.beginPath();
    ctx.arc(cx + dx, cy + dz, b.index === selectedIndex ? 3 : 1.8, 0, Math.PI * 2);
    ctx.globalAlpha = b.index === selectedIndex ? 1 : 0.85;
    ctx.fillStyle = b.accent;
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Heading arrow - points the direction the camera is currently looking.
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(-camTheta);
  ctx.beginPath();
  ctx.moveTo(0, -9);
  ctx.lineTo(-5, 3);
  ctx.lineTo(0, 0.5);
  ctx.lineTo(5, 3);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fill();
  ctx.restore();

  // Player/center marker
  ctx.beginPath();
  ctx.arc(cx, cy, 2.4, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();

  // Fixed compass label - doesn't rotate with the view
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('N', cx, 10);
}

let firstFrameRendered = false;
function animate() {
  requestAnimationFrame(animate);
  stepCameraTowardGoal();
  drawMinimap();

  // Drift the ambient light motes gently upward, looping back to the
  // ground once they clear the tallest tower, instead of a static sprinkle.
  const moteState = window.__memoryMotes;
  if (moteState) {
    const posAttr = moteState.motes.geometry.attributes.position;
    for (let i = 0; i < moteState.speeds.length; i++) {
      let y = posAttr.getY(i) + moteState.speeds[i] * 0.045;
      if (y > moteState.top) y = 0;
      posAttr.setY(i, y);
    }
    posAttr.needsUpdate = true;
  }

  // Rooftop searchlight beams pulse up and down (not one flat direction) -
  // a sine wave drives the texture offset back and forth, so brightness
  // visibly travels up the shaft then back down, on every beam at once
  // since they all share this one texture.
  beamTexture.offset.y = Math.sin(performance.now() * 0.0016) * 0.4;

  // Scroll every building's side energy-lines texture in its own stored
  // direction - negative speeds climb upward, positive speeds descend, so
  // both currents run at once on every tower.
  for (let i = 0; i < scrollingEnergyMaterials.length; i++) {
    const entry = scrollingEnergyMaterials[i];
    entry.mat.map.offset.y += entry.speed;
  }

  // Gentle continuous spin on each rooftop orb/gem, core and wireframe
  // shell rotating at slightly different rates so it doesn't read as one
  // rigid rotating solid.
  for (let i = 0; i < spinningOrbs.length; i++) {
    const o = spinningOrbs[i];
    o.core.rotation.y += 0.01;
    o.shell.rotation.y -= 0.006;
    o.shell.rotation.x += 0.004;
  }

  // Lake surface ripple drifts slowly, and each car advances along the
  // ring road, facing the direction it's currently driving.
  if (lakeMaterial) {
    lakeMaterial.map.offset.x += 0.0006;
    lakeMaterial.map.offset.y += 0.0003;
  }
  // Waterfall streaks continuously slide down the cliff face.
  for (let i = 0; i < waterfallMaterials.length; i++) {
    waterfallMaterials[i].map.offset.y -= 0.02;
  }
  for (let i = 0; i < roadCars.length; i++) {
    const rc = roadCars[i];
    rc.angle += rc.speed * 0.01;
    rc.car.position.set(Math.cos(rc.angle) * rc.radius, 0, Math.sin(rc.angle) * rc.radius);
    rc.car.rotation.y = -rc.angle + (rc.speed > 0 ? Math.PI / 2 : -Math.PI / 2);
  }

  // Balloons drift the same way cars do (slow circular loop) but also bob
  // gently up and down on a sine wave, and rotate slowly on their own axis
  // so the stripe pattern isn't static from a fixed camera angle.
  for (let i = 0; i < balloonEntries.length; i++) {
    const be = balloonEntries[i];
    be.angle += be.speed * 0.01;
    const bob = Math.sin(performance.now() * 0.0006 + be.bobPhase) * 1.6;
    be.group.position.set(Math.cos(be.angle) * be.radius, be.baseY + bob, Math.sin(be.angle) * be.radius);
    be.group.rotation.y += 0.002;
  }

  // Joystick pans the camera rig across the ground - forward/back and
  // strafe are computed from the camera's current heading (camTheta) so
  // "up" on the stick always means "the direction currently faced." In
  // flight mode the same stick also moves vertically (climb/dive) based on
  // the current look pitch (camPhi), so looking up and pushing forward
  // makes you climb, like a plane.
  if (Math.abs(joystickVec.x) > 0.02 || Math.abs(joystickVec.y) > 0.02) {
    if (flightMode) {
      const speed = 0.85;
      const fx = -Math.sin(camPhi) * Math.sin(camTheta);
      const fy = -Math.cos(camPhi);
      const fz = -Math.sin(camPhi) * Math.cos(camTheta);
      const rightX = Math.cos(camTheta), rightZ = -Math.sin(camTheta);
      flightPos.x += (fx * -joystickVec.y + rightX * joystickVec.x) * speed;
      flightPos.y += (fy * -joystickVec.y) * speed;
      flightPos.z += (fz * -joystickVec.y + rightZ * joystickVec.x) * speed;
      flightPos.y = Math.max(2, flightPos.y);
    } else {
      const moveSpeed = 0.5;
      const forwardX = -Math.sin(camTheta), forwardZ = -Math.cos(camTheta);
      const rightX = -forwardZ, rightZ = forwardX;
      const dx = (forwardX * -joystickVec.y + rightX * joystickVec.x) * moveSpeed;
      const dz = (forwardZ * -joystickVec.y + rightZ * joystickVec.x) * moveSpeed;
      lookAtTarget.x += dx; lookAtTarget.z += dz;
      lookAtGoal.x += dx; lookAtGoal.z += dz;
    }
  }

  // Fireworks: rockets rise then hand off to a particle burst; bursts
  // integrate simple gravity each frame and fade out before being disposed.
  const fwNow = performance.now();
  for (let i = fireworkRockets.length - 1; i >= 0; i--) {
    const r = fireworkRockets[i];
    const t = Math.min(1, (fwNow - r.start) / r.duration);
    r.sprite.position.lerpVectors(r.from, r.to, t);
    r.sprite.material.opacity = 0.95 * (1 - t * 0.3);
    if (t >= 1) {
      scene.remove(r.sprite);
      r.sprite.material.dispose();
      spawnFireworkBurst(r.to, r.color);
      if (r.text) spawnFireworkText(r.to, r.text, r.color);
      fireworkRockets.splice(i, 1);
    }
  }
  for (let i = fireworkBursts.length - 1; i >= 0; i--) {
    const b = fireworkBursts[i];
    const t = (fwNow - b.start) / b.duration;
    if (t >= 1) {
      scene.remove(b.points);
      b.points.geometry.dispose();
      b.points.material.dispose();
      fireworkBursts.splice(i, 1);
      continue;
    }
    const posAttr = b.points.geometry.attributes.position;
    const dtSec = 0.016;
    for (let j = 0; j < posAttr.count; j++) {
      b.velocities[j * 3 + 1] -= 5 * dtSec;
      posAttr.array[j * 3] += b.velocities[j * 3] * dtSec;
      posAttr.array[j * 3 + 1] += b.velocities[j * 3 + 1] * dtSec;
      posAttr.array[j * 3 + 2] += b.velocities[j * 3 + 2] * dtSec;
    }
    posAttr.needsUpdate = true;
    b.points.material.opacity = 1 - t;
  }

  // Text particles converge into the memory snippet shape, held long
  // enough to read, then fade. Billboarded every frame using the camera's
  // own right/up basis vectors so the text stays facing you even if you
  // keep orbiting or flying during the hold.
  if (fireworkTexts.length > 0) {
    const camRight = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld, 0);
    const camUp = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld, 1);
    for (let i = fireworkTexts.length - 1; i >= 0; i--) {
      const ft = fireworkTexts[i];
      const elapsed = fwNow - ft.start;
      const total = ft.convergeDur + ft.holdDur + ft.fadeDur;
      if (elapsed > total) {
        scene.remove(ft.points);
        ft.points.geometry.dispose();
        ft.points.material.dispose();
        fireworkTexts.splice(i, 1);
        continue;
      }
      let progress, opacity;
      if (elapsed < ft.convergeDur) {
        progress = elapsed / ft.convergeDur;
        opacity = progress;
      } else if (elapsed < ft.convergeDur + ft.holdDur) {
        progress = 1;
        opacity = 1;
      } else {
        progress = 1;
        opacity = 1 - (elapsed - ft.convergeDur - ft.holdDur) / ft.fadeDur;
      }
      const ease = progress * progress * (3 - 2 * progress);
      const posAttr = ft.points.geometry.attributes.position;
      for (let j = 0; j < ft.count; j++) {
        const lx = ft.startLocal[j * 2] + (ft.targetLocal[j * 2] - ft.startLocal[j * 2]) * ease;
        const ly = ft.startLocal[j * 2 + 1] + (ft.targetLocal[j * 2 + 1] - ft.startLocal[j * 2 + 1]) * ease;
        posAttr.array[j * 3] = ft.origin.x + camRight.x * lx + camUp.x * ly;
        posAttr.array[j * 3 + 1] = ft.origin.y + camRight.y * lx + camUp.y * ly;
        posAttr.array[j * 3 + 2] = ft.origin.z + camRight.z * lx + camUp.z * ly;
      }
      posAttr.needsUpdate = true;
      ft.points.material.opacity = Math.max(0, opacity);
    }
  }

  if (altUpHeld || altDownHeld) {
    const altSpeed = 0.5 * (altUpHeld ? 1 : -1);
    if (flightMode) {
      flightPos.y = Math.max(2, flightPos.y + altSpeed);
    } else {
      lookAtTarget.y = Math.max(1, lookAtTarget.y + altSpeed);
      lookAtGoal.y = Math.max(1, lookAtGoal.y + altSpeed);
    }
  }

  // Ground rings pulse gently (each with its own random phase so they
  // don't all breathe in lockstep) - reinforces the up/down energy motif
  // down at the base of every tower, not just on the facade/beam.
  const pulseT = performance.now() * 0.0022;
  for (let i = 0; i < pulsingRingMaterials.length; i++) {
    const p = pulsingRingMaterials[i];
    p.mat.opacity = p.base * (0.65 + 0.35 * Math.sin(pulseT + p.phase));
  }

  // Laser scan rings travel up and down each tower's body on a loop -
  // sin() maps smoothly to [0,1] so the ring eases at the top/bottom
  // instead of snapping back.
  for (let i = 0; i < scanRingEntries.length; i++) {
    const s = scanRingEntries[i];
    const t = Math.sin(performance.now() * 0.001 * s.speed + s.phase) * 0.5 + 0.5;
    const y = -s.h / 2 + t * s.h;
    s.ring.position.y = y;
    s.core.position.y = y;
  }

  // Plateau cars climb their fixed waypoint road, ping-ponging between
  // the base and the summit instead of just circling like the ring-road
  // cars.
  for (let i = 0; i < plateauCars.length; i++) {
    const pc = plateauCars[i];
    pc.t += pc.speed * 0.01 * (pc.dir || 1);
    if (pc.t >= 1) { pc.t = 1; pc.dir = -1; }
    if (pc.t <= 0) { pc.t = 0; pc.dir = 1; }
    const pts = pc.points;
    const fIdx = pc.t * (pts.length - 1);
    const i0 = Math.floor(fIdx), i1 = Math.min(pts.length - 1, i0 + 1);
    const frac = fIdx - i0;
    const p0 = pts[i0], p1 = pts[i1];
    pc.car.position.set(
      p0.x + (p1.x - p0.x) * frac,
      p0.y + (p1.y - p0.y) * frac,
      p0.z + (p1.z - p0.z) * frac
    );
    pc.car.rotation.y = Math.atan2(p1.x - p0.x, p1.z - p0.z) + (pc.dir < 0 ? Math.PI : 0);
  }

  renderer.render(scene, camera);
  if (!firstFrameRendered) {
    firstFrameRendered = true;
    const el = document.getElementById('status');
    if (el) el.style.display = 'none';
  }
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

} catch (err) {
  const el = document.getElementById('status');
  el.className = 'error';
  el.style.display = 'block';
  el.textContent = 'BUILD ERROR: ' + (err && err.message ? err.message : err);
}
</script>
</body>
</html>
