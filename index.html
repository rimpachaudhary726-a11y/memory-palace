// Small built-in orbit camera (no OrbitControls.js dependency - that file
// isn't reliably available from CDNs for a plain script tag anymore, so
// this avoids the external-file failure point entirely). Orbits around
// `lookAtTarget`, which can be smoothly animated toward a tapped building
// for a "fly over and land" feel instead of a hard cut.
let camDistance = 34, camTheta = 0.0, camPhi = 1.0;
let camDistanceGoal = camDistance;
let camThetaGoal = camTheta, camPhiGoal = camPhi;

function updateCamera() {
  camPhi = Math.max(0.15, Math.min(1.5, camPhi));
  camDistance = Math.max(6, Math.min(320, camDistance));
  camera.position.x = lookAtTarget.x + camDistance * Math.sin(camPhi) * Math.sin(camTheta);
  camera.position.y = lookAtTarget.y + camDistance * Math.cos(camPhi);
  camera.position.z = lookAtTarget.z + camDistance * Math.sin(camPhi) * Math.cos(camTheta);
  camera.lookAt(lookAtTarget);

  camTheta += (camThetaGoal - camTheta) * 0.22;

  switch (key) {

    case 'dodecahedron': return new THREE.DodecahedronGeometry(1.15*s);
    case 'icosahedron': return new THREE.IcosahedronGeometry(1.15*s);

// Baked facade texture: window grid + 1-2 random accent-colored floor bands,
// painted onto a single canvas instead of dozens of individual window plane
// meshes. This is what gives GitCity-style buildings their "designed"
// texture (colored stripes, varied window states) instead of a flat tint,
// and it's much cheaper to render than one mesh per window.
function buildFacadeTexture(accentHex, h) {
  const texW = 192, texH = 384;
  const canvas = document.createElement('canvas');
  canvas.width = texW; canvas.height = texH;
  const ctx = canvas.getContext('2d');

  // Dark graphite/navy facade (Git City style) instead of a light gray
  // panel - this is what makes the lit windows actually pop instead of
  // reading as a flat pale wall.
  ctx.fillStyle = '#0c1120';
  ctx.fillRect(0, 0, texW, texH);

  // faint vertical panel seams
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  const seams = 6;
  for (let i = 1; i < seams; i++) {
    ctx.beginPath(); ctx.moveTo(i * texW / seams, 0); ctx.lineTo(i * texW / seams, texH); ctx.stroke();
  }

  // Row count scales with the building's real height so windows stay
  // roughly floor-sized instead of stretching thin on tall towers.
  const rows = Math.max(14, Math.min(90, Math.round((h || 12) * 2.4)));
  const cols = 9;
  const cellW = texW / cols, cellH = texH / rows;

  // faint horizontal floor divider lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  for (let r = 1; r < rows; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * cellH); ctx.lineTo(texW, r * cellH); ctx.stroke();
  }

  const bandRows = new Set();
  const bandCount = 1 + Math.floor(Math.random() * 2);
  for (let i = 0; i < bandCount; i++) bandRows.add(Math.floor(Math.random() * rows));

  for (let r = 0; r < rows; r++) {
    const isBand = bandRows.has(r);
    for (let c = 0; c < cols; c++) {
      // Tighter padding than before - windows sit closer together as
      // near-solid blocks, closer to Git City's blocky pixel-grid facades
      // instead of small isolated dots with a lot of dark gap around them.
      const pad = cellW * 0.1;
      const x = c * cellW + pad, y = r * cellH + cellH * 0.12;
      const wsz = cellW - 2 * pad, hsz = cellH * 0.76;
      if (isBand) {
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = accentHex;
      } else {
        // Roughly half the windows lit at rest - a livelier, more
        // Git-City-like twinkling skyline instead of a mostly-dark one.
        const roll = Math.random();
        if (roll > 0.62) {
          ctx.globalAlpha = 0.9;
          ctx.fillStyle = '#ffce6b';
        } else if (roll > 0.48) {
          ctx.globalAlpha = 0.85;
          ctx.fillStyle = '#8fd8ff';
        } else {
          ctx.globalAlpha = 0.9;
          ctx.fillStyle = '#141b30';
        }
      }
      ctx.fillRect(x, y, wsz, hsz);
      ctx.globalAlpha = 1;
    }
  }

  // grime/noise speckle - tiny dark specks scattered across the facade so
  // it reads as a weathered surface instead of a clean flat render
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = '#000000';
  for (let i = 0; i < 260; i++) {
    const sx = Math.random() * texW, sy = Math.random() * texH;
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }
  ctx.globalAlpha = 1;

  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  // Nearest filtering keeps window edges crisp and blocky (Git City's
  // pixel-art look) instead of the soft blur mipmapping/bilinear filtering
  // gives by default, which was flattening the grid into a smear from
  // any distance.
  tex.magFilter = THREE.NearestFilter;
  tex.minFilter = THREE.NearestFilter;
  return tex;
}

// Roof cap + rooftop greebles + base plinth. capScale/plinthScale let a

      );

  }

  const plinthGeo = new THREE.CylinderGeometry(1.27 * plinthScale + 0.3, 1.4 * plinthScale + 0.4, 0.22, 24);
  const plinthMat = new THREE.MeshStandardMaterial({ color: 0x14141c, roughness: 0.9 });

// The vertical "searchlight" shooting up from a rooftop into the sky - the
// signature Git City effect. Taller (deeper-memory) buildings get a
// taller, slightly brighter beam, so the effect itself carries meaning
// instead of being purely decorative.
function addRooftopBeam(parent, capScale, h, accentColor) {
  const beamHeight = Math.max(24, h * 1.6);
  const beamGeo = new THREE.CylinderGeometry(0.1 * capScale + 0.04, 0.16 * capScale + 0.06, beamHeight, 10, 1, true);
  const beamMat = new THREE.MeshBasicMaterial({
    map: beamTexture, color: new THREE.Color(accentColor),
    transparent: true, opacity: 0.55, depthWrite: false,
    blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
  });
  const beam = new THREE.Mesh(beamGeo, beamMat);
  beam.position.y = h / 2 + beamHeight / 2 + 0.15;
  parent.add(beam);
  return beam;
}

// Flat glowing ring on the ground around the building's base - the
// "landing pad" halo visible around towers in the Git City screenshots.
function addGroundRing(parent, plinthScale, h, accentColor) {
  const inner = 1.55 * plinthScale + 0.55;
  const ringGeo = new THREE.RingGeometry(inner, inner + 0.16, 40);
  const ringMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(accentColor), transparent: true, opacity: 0.5,
    side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = -h / 2 - 0.09;
  parent.add(ring);
  return ring;
}

// Soft additive glow sprite - cheap stand-in for real bloom postprocessing
// (which would need extra CDN files we're deliberately avoiding). Sits
// behind each building's point light and fakes a light-bleed halo.
const glowTexture = (() => {
  const c = document.createElement('canvas');
  c.width = 128; c.height = 128;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
  g.addColorStop(0, 'rgba(255,255,255,0.9)');
  g.addColorStop(0.4, 'rgba(255,255,255,0.25)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(c);
})();

// Vertical fade texture for the rooftop light beams - the "searchlight
// shooting into the sky" effect from the Git City reference screenshots.
// Solid near the roof, fading to nothing higher up.
const beamTexture = (() => {
  const c = document.createElement('canvas');
  c.width = 8; c.height = 256;
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0, 256, 0, 0);
  g.addColorStop(0, 'rgba(255,255,255,0.95)');
  g.addColorStop(0.5, 'rgba(255,255,255,0.35)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 8, 256);
  return new THREE.CanvasTexture(c);
})();

function addGlowSprite(position, color, scale) {
  const mat = new THREE.SpriteMaterial({
    map: glowTexture, color: new THREE.Color(color),
    transparent: true, opacity: 0.55, depthWrite: false, blending: THREE.AdditiveBlending,
  });
  const sprite = new THREE.Sprite(mat);
  sprite.position.copy(position);
  sprite.scale.set(scale, scale, 1);
  scene.add(sprite);
  return sprite;
}

// Builds one building as a Group. Box/cylinder memories become a stepped,
// setback tower (2-3 tiers narrowing upward, wedding-cake style like real
// skyscrapers / GitCity's silhouettes) with a baked facade texture on every
// tier. Landmark shapes (sphere, cone, torusKnot, etc, driven by objects
// like "bicycle" or "tree") stay as single sculptural forms - they're meant
// to read as monuments, not office towers.
function buildBuildingGroup(b, h) {
  const group = new THREE.Group();
  const key = b.geometry, s = b.scale, accent = b.accent;
  const isTiered = (key === 'box' || key === 'cylinder');
  const materials = [];

  if (!isTiered) {
    const geo = makeGeometry(key, s, h);
    const mat = new THREE.MeshStandardMaterial({
      color: 0xdfe6ee, emissive: new THREE.Color(accent), emissiveIntensity: 0.22,
      metalness: 0.3, roughness: 0.45, envMapIntensity: 0.8,
    });
    materials.push(mat);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.userData = b;
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    group.add(mesh);
    clickable.push(mesh);
    addRoofDetails(group, key, s, s, h, accent);
    return { group, materials };
  }

  const tex = buildFacadeTexture(accent, h);
  // Mostly one slender tower with a single narrower cap tier near the top
  // (a slight setback, not a wedding cake) - reads as a real skyscraper the
  // taller it gets, instead of visibly shrinking in three big steps.
  const tierCount = h > 14 ? 2 : 1;
  const heightFracs = tierCount === 2 ? [0.84, 0.16] : [1.0];
  const widthFactor = 0.7;
  let cursorY = -h / 2;
  let topScale = s;

  for (let i = 0; i < tierCount; i++) {
    const tierH = h * heightFracs[i];
    const tierScale = s * Math.pow(widthFactor, i);
    topScale = tierScale;
    const geo = key === 'box'
      ? new THREE.BoxGeometry(1.9 * tierScale, tierH, 1.9 * tierScale)
      : new THREE.CylinderGeometry(0.98 * tierScale, 0.98 * tierScale, tierH, 20);
    const mat = new THREE.MeshStandardMaterial({
      map: tex, color: 0xffffff, emissive: new THREE.Color(accent), emissiveIntensity: 0.16,
      metalness: 0.25, roughness: 0.5, envMapIntensity: 0.8,
    });
    materials.push(mat);
    const tierMesh = new THREE.Mesh(geo, mat);
    tierMesh.position.y = cursorY + tierH / 2;
    tierMesh.userData = b;
    tierMesh.castShadow = true;
    tierMesh.receiveShadow = true;
    group.add(tierMesh);
    clickable.push(tierMesh);
    cursorY += tierH;
  }

  addRoofDetails(group, key, s, topScale, h, accent);
  return { group, materials };
}

const clickable = [];
const raycaster = new THREE.Raycaster();
const labelEl = document.getElementById('label');

const maxRadius = BUILDINGS.reduce((m, b) => Math.max(m, Math.hypot(b.position.x, b.position.z)), 0);
const maxHeight = BUILDINGS.reduce((m, b) => Math.max(m, b.height || 2.5), 0);
const OVERVIEW_DISTANCE = Math.max(24, maxRadius * 1.6 + 14, maxHeight * 1.4 + 18);
camDistance = OVERVIEW_DISTANCE;
camDistanceGoal = OVERVIEW_DISTANCE;
camPhi = camPhiGoal = 0.85;
updateCamera();

const buildingRegistry = {};

BUILDINGS.forEach(b => {
  const h = b.height || 2.5;
  const { group, materials } = buildBuildingGroup(b, h);
  group.position.set(b.position.x, b.position.y, b.position.z);
  group.userData = b;
  scene.add(group);

  // Small glowing marker light per building - kept subtle at rest (sqrt of
  // height, not linear) so tall towers don't turn into blown-out light
  // bulbs; a tapped building still pops via applyHighlight() below.
  const baseLightIntensity = 0.42;
  const glow = new THREE.PointLight(new THREE.Color(b.accent), baseLightIntensity, 8);
  glow.position.set(b.position.x, b.position.y + h * 0.3, b.position.z);
  scene.add(glow);
  const baseSpriteScale = Math.max(1.8, Math.sqrt(h) * 1.25);
  const baseSpriteOpacity = 0.4;
  const sprite = addGlowSprite(glow.position, b.accent, baseSpriteScale);

  buildingRegistry[b.index] = {
    materials,
    baseEmissive: materials.map(m => m.emissiveIntensity),
    light: glow,
    baseLightIntensity,
    sprite,
    baseSpriteOpacity,
    baseSpriteScale,
  };
});

// Selecting a building boosts its own glow (facade emissive, point light,
// halo sprite) well above the resting city glow, then reverts the previous
// selection back to its dim resting state - so only the tapped building
// "lights up" instead of the whole skyline looking uniformly bright.
let selectedIndex = null;

function clearHighlight(idx) {
  const reg = buildingRegistry[idx];
  if (!reg) return;
  reg.materials.forEach((m, i) => { m.emissiveIntensity = reg.baseEmissive[i]; });
  reg.light.intensity = reg.baseLightIntensity;
  reg.sprite.material.opacity = reg.baseSpriteOpacity;
  reg.sprite.scale.set(reg.baseSpriteScale, reg.baseSpriteScale, 1);
}

function applyHighlight(idx) {
  const reg = buildingRegistry[idx];
  if (!reg) return;
  reg.materials.forEach((m, i) => { m.emissiveIntensity = reg.baseEmissive[i] + 0.3; });
  reg.light.intensity = reg.baseLightIntensity * 4.0;
  reg.sprite.material.opacity = 0.85;
  reg.sprite.scale.set(reg.baseSpriteScale * 1.5, reg.baseSpriteScale * 1.5, 1);
}

function setSelected(idx) {
  if (selectedIndex !== null && selectedIndex !== idx) clearHighlight(selectedIndex);
  selectedIndex = idx;
  if (idx !== null) applyHighlight(idx);
}

function showLabel(b) {
  const objs = (b.objects || []).join(', ');
  labelEl.innerHTML = '<b>' + b.emotion.toUpperCase() + '</b>' +
    (objs ? ' &middot; ' + objs : '') +
    (b.snippet ? '<br>' + b.snippet : '');
  labelEl.style.display = 'block';
}

function handlePick(clientX, clientY) {
  const mouse = new THREE.Vector2(
    (clientX / window.innerWidth) * 2 - 1,
    -(clientY / window.innerHeight) * 2 + 1
  );
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickable);
  if (hits.length > 0) {
    showLabel(hits[0].object.userData);
    flyToBuilding(hits[0].object.userData);
    setSelected(hits[0].object.userData.index);
  } else {
    labelEl.style.display = 'none';
    lookAtGoal.set(0, 3, 0);
    camDistanceGoal = OVERVIEW_DISTANCE;
    setSelected(null);
  }
}

let isDragging = false, dragMoved = false, lastX = 0, lastY = 0;

// Tracks every finger currently down, keyed by pointerId, so we can tell a
// one-finger drag (orbit) apart from a two-finger pinch (zoom). The old
// code only ever remembered a single lastX/lastY, so a second finger
// touching down just stomped on the first one's tracking and there was no
// way to zoom on a touchscreen at all - wheel only fires for a mouse.
const activePointers = new Map();
let pinchStartDist = null;

function pointerDistance() {
  const pts = Array.from(activePointers.values());
  if (pts.length < 2) return null;
  const dx = pts[0].x - pts[1].x;
  const dy = pts[0].y - pts[1].y;
  return Math.hypot(dx, dy);
}

// touch-action: none stops the mobile browser from intercepting drag/pinch
// gestures for its own scroll/refresh/zoom handling, which is what was
// causing the "go-stop-go-stop" stutter and also blocks our own pinch
// handling below - without this, touchmove events arrive in uneven
// throttled bursts instead of a smooth stream.
renderer.domElement.style.touchAction = 'none';

renderer.domElement.addEventListener('pointerdown', (e) => {
  activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (activePointers.size === 1) {
    isDragging = true;
    dragMoved = false;
    lastX = e.clientX;
    lastY = e.clientY;
  } else {
    // A second finger just landed - switch out of single-finger orbit
    // mode and start tracking pinch distance instead.
    isDragging = false;
    pinchStartDist = pointerDistance();
  }
});

renderer.domElement.addEventListener('pointermove', (e) => {
  if (!activePointers.has(e.pointerId)) return;
  activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (activePointers.size >= 2) {
    const dist = pointerDistance();
    if (pinchStartDist !== null && dist !== null) {
      const delta = dist - pinchStartDist;
      // Fingers spreading apart (delta > 0) should zoom IN, so it
      // subtracts from camera distance.
      camDistanceGoal = Math.max(6, Math.min(320, camDistanceGoal - delta * 0.09));
    }
    pinchStartDist = dist;
    return;
  }

  if (!isDragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;
  camThetaGoal -= dx * 0.012;
  camPhiGoal -= dy * 0.012;
  camPhiGoal = Math.max(0.15, Math.min(1.5, camPhiGoal));
  lastX = e.clientX;
  lastY = e.clientY;
});

function releasePointer(e) {
  activePointers.delete(e.pointerId);
  if (activePointers.size >= 2) {
    // Still pinching with the remaining fingers - just re-anchor.
    pinchStartDist = pointerDistance();
    isDragging = false;
  } else if (activePointers.size === 1) {
    // Dropped from two fingers to one - resume orbiting from here instead
    // of jumping, using whichever finger is still down.
    const remaining = Array.from(activePointers.values())[0];
    lastX = remaining.x;
    lastY = remaining.y;
    isDragging = true;
    dragMoved = true; // avoid firing a tap-select right after a pinch
    pinchStartDist = null;
  } else {
    pinchStartDist = null;
    if (isDragging && !dragMoved) handlePick(e.clientX, e.clientY);
    isDragging = false;
  }
}

renderer.domElement.addEventListener('pointerup', releasePointer);
renderer.domElement.addEventListener('pointercancel', releasePointer);

renderer.domElement.addEventListener('wheel', (e) => {
  camDistanceGoal = Math.max(6, Math.min(320, camDistanceGoal + e.deltaY * 0.03));
  camDistance = camDistanceGoal;
  updateCamera();
}, { passive: true });

let firstFrameRendered = false;
function animate() {
  requestAnimationFrame(animate);
  stepCameraTowardGoal();
  renderer.render(scene, camera);
  if (!firstFrameRendered) {
    firstFrameRendered = true;
    const el = document.getElementById('status');
    if (el) el.style.display = 'none';
  }
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

} catch (err) {
  const el = document.getElementById('status');
  el.className = 'error';
  el.style.display = 'block';
  el.textContent = 'BUILD ERROR: ' + (err && err.message ? err.message : err);
}
</script>
</body>
</html>
