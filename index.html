// Night sky dome - a richer gradient with a visible glowing moon, painted
// onto one equirectangular canvas (also reused as scene.environment so
// windows/metal trim have something real to reflect instead of flat black).
let nightSkyTex;
{
  const skyW = 512, skyH = 256;
  const skyCanvas = document.createElement('canvas');
  skyCanvas.width = skyW; skyCanvas.height = skyH;
  const ctx = skyCanvas.getContext('2d');

  // Vertical gradient: bright zenith blue fading through a violet dusk
  // band and a lit horizon (city glow) down to the ground - noticeably
  // more color and mood than a near-black void, closer to the purple
  // night-sky feel in the Git City reference.
  const grad = ctx.createLinearGradient(0, 0, 0, skyH);
  grad.addColorStop(0, '#080a24');
  grad.addColorStop(0.35, '#151246');
  grad.addColorStop(0.6, '#2c1f5e');
  grad.addColorStop(0.8, '#4a2f66');
  grad.addColorStop(0.92, '#3a3468');
  grad.addColorStop(1, '#0a1230');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, skyW, skyH);

  // Aurora borealis - wavy vertical curtains of light rising from near the
  // horizon, painted as many thin gradient columns whose height follows a
  // layered sine wave (so the top edge ripples like real aurora instead of
  // a flat band). 'lighter' composite mode makes overlapping streaks glow
  // brighter where they cross, like the reference photo, instead of just
  // tinting flat.
  {
    const horizonY = skyH * 0.66;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const auroraLayers = [
      { rgb: [90, 255, 170], baseAlpha: 0.5, freq: 0.018, phase: 0.0, ampMul: 1.0 },
      { rgb: [60, 220, 190], baseAlpha: 0.34, freq: 0.026, phase: 2.1, ampMul: 0.82 },
      { rgb: [140, 190, 255], baseAlpha: 0.16, freq: 0.014, phase: 4.4, ampMul: 0.55 },
    ];
    auroraLayers.forEach(layer => {
      const [r, g, b] = layer.rgb;
      const step = 4;
      for (let x = 0; x <= skyW; x += step) {
        const n = Math.sin(x * layer.freq + layer.phase) * 0.5
                + Math.sin(x * layer.freq * 2.3 + layer.phase * 1.7) * 0.25 + 0.5;
        const norm = Math.max(0, Math.min(1, n));
        const streakH = skyH * 0.42 * layer.ampMul * (0.3 + 0.7 * norm);
        const topY = horizonY - streakH;
        const streakGrad = ctx.createLinearGradient(0, horizonY, 0, topY);
        streakGrad.addColorStop(0, `rgba(${r},${g},${b},${layer.baseAlpha * 0.12})`);
        streakGrad.addColorStop(0.35, `rgba(${r},${g},${b},${layer.baseAlpha})`);
        streakGrad.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.fillStyle = streakGrad;
        ctx.fillRect(x, topY, step + 1, streakH);
      }
    });
    ctx.restore();
  }

  // Soft glowing moon
  const moonX = skyW * 0.74, moonY = skyH * 0.22, moonR = 16;
  const moonGlow = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, moonR * 5);
  moonGlow.addColorStop(0, 'rgba(226,238,255,0.55)');
  moonGlow.addColorStop(0.3, 'rgba(200,220,255,0.18)');
  moonGlow.addColorStop(1, 'rgba(200,220,255,0)');
  ctx.fillStyle = moonGlow;
  ctx.fillRect(0, 0, skyW, skyH);
  ctx.beginPath();
  ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2);
  ctx.fillStyle = '#eef4ff';
  ctx.fill();

  // A few soft cloud smudges for depth
  ctx.globalAlpha = 0.06;
  ctx.fillStyle = '#ffffff';
  for (let i = 0; i < 10; i++) {
    const cx = Math.random() * skyW, cy = skyH * (0.3 + Math.random() * 0.35);
    const rw = 40 + Math.random() * 60;
    ctx.beginPath();
    ctx.ellipse(cx, cy, rw, rw * 0.25, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  nightSkyTex = new THREE.CanvasTexture(skyCanvas);

// Small built-in orbit camera (no OrbitControls.js dependency - that file
// isn't reliably available from CDNs for a plain script tag anymore, so
// this avoids the external-file failure point entirely). Orbits around
// `lookAtTarget`, which can be smoothly animated toward a tapped building
// for a "fly over and land" feel instead of a hard cut.
let camDistance = 34, camTheta = 0.0, camPhi = 1.0;
let camDistanceGoal = camDistance;
let camThetaGoal = camTheta, camPhiGoal = camPhi;
let lookAtTarget = new THREE.Vector3(0, 3, 0);
let lookAtGoal = lookAtTarget.clone();

// Fly mode: a free-flight camera (position moves through space rather than
// orbiting a fixed target). Reuses camTheta/camPhi as yaw/pitch (drag to
// look, same as orbit mode) and camThetaGoal/camPhiGoal for the same
// eased-rotation feel, so the "look" controls feel identical between modes
// - only what the rotation angles DO (orbit vs. steer) changes.
let flightMode = false;
let flightPos = new THREE.Vector3(0, 20, 40);

function updateCamera() {
  if (flightMode) {
    const fx = -Math.sin(camPhi) * Math.sin(camTheta);
    const fy = -Math.cos(camPhi);
    const fz = -Math.sin(camPhi) * Math.cos(camTheta);
    camera.position.copy(flightPos);
    camera.lookAt(flightPos.x + fx, flightPos.y + fy, flightPos.z + fz);
    return;
  }
  camPhi = Math.max(0.15, Math.min(1.5, camPhi));
  camDistance = Math.max(6, Math.min(320, camDistance));
  camera.position.x = lookAtTarget.x + camDistance * Math.sin(camPhi) * Math.sin(camTheta);
  camera.position.y = lookAtTarget.y + camDistance * Math.cos(camPhi);
  camera.position.z = lookAtTarget.z + camDistance * Math.sin(camPhi) * Math.cos(camTheta);
  camera.lookAt(lookAtTarget);
}

function stepCameraTowardGoal() {
  lookAtTarget.lerp(lookAtGoal, 0.06);
  camDistance += (camDistanceGoal - camDistance) * 0.06;
  // Rotation is also lerped every frame (not snapped on each touch event) so
  // orbiting stays silky even when touch events arrive in uneven bursts,
  // instead of the "go-stop-go-stop" jitter of applying raw deltas directly.
  camTheta += (camThetaGoal - camTheta) * 0.22;
  camPhi += (camPhiGoal - camPhi) * 0.22;
  updateCamera();
}

function flyToBuilding(b) {
  lookAtGoal.set(b.position.x, b.position.y, b.position.z);
  camDistanceGoal = Math.max(8, (b.height || 2.5) * 2 + 5);
}

//
// Two size tiers (many small dim stars + a sparser handful of bigger
// bright ones, some warm-tinted) reads as a much richer sky than one
// uniform field, closer to the dense, varied night sky in the reference.
function buildStarLayer(count, size, opacity, colorPalette) {
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  const tmpColor = new THREE.Color();
  for (let i = 0; i < count; i++) {
    const r = 300 + Math.random() * 340;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = Math.abs(r * Math.cos(phi));
    positions[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
    tmpColor.set(colorPalette[Math.floor(Math.random() * colorPalette.length)]);
    colors[i*3] = tmpColor.r; colors[i*3+1] = tmpColor.g; colors[i*3+2] = tmpColor.b;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.PointsMaterial({
    size, sizeAttenuation: true, transparent: true, opacity,
    vertexColors: true, fog: false, depthWrite: false,
  });
  return new THREE.Points(geo, mat);
}

// Ground - subtle radial gradient + faint grid, instead of one flat color,
// so the plaza reads as a lit surface rather than a dark cutout.
{
  const size = 512;
  const gCanvas = document.createElement('canvas');
  gCanvas.width = size; gCanvas.height = size;
  const gctx = gCanvas.getContext('2d');
  const radial = gctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  radial.addColorStop(0, '#141c34');
  radial.addColorStop(0.6, '#0c1224');
  radial.addColorStop(1, '#060a16');
  gctx.fillStyle = radial;
  gctx.fillRect(0, 0, size, size);
  gctx.strokeStyle = 'rgba(255,255,255,0.04)';
  gctx.lineWidth = 1;
  const step = size / 24;
  for (let i = 0; i <= 24; i++) {
    gctx.beginPath(); gctx.moveTo(i*step, 0); gctx.lineTo(i*step, size); gctx.stroke();
    gctx.beginPath(); gctx.moveTo(0, i*step); gctx.lineTo(size, i*step); gctx.stroke();
  }
  const groundTex = new THREE.CanvasTexture(gCanvas);
  const ground = new THREE.Mesh(
    new THREE.CircleGeometry(420, 64),
    new THREE.MeshStandardMaterial({ map: groundTex, color: 0xffffff, roughness: 0.95, metalness: 0.05 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);
}

function makeGeometry(key, s, h) {
  switch (key) {
    case 'sphere': return new THREE.SphereGeometry(1.15*s, 20, 16);
    case 'torusKnot': return new THREE.TorusKnotGeometry(0.75*s, 0.3*s, 100, 16);
    case 'cylinder': return new THREE.CylinderGeometry(0.98*s, 0.98*s, h, 20);
    case 'dodecahedron': return new THREE.DodecahedronGeometry(1.15*s);
    case 'icosahedron': return new THREE.IcosahedronGeometry(1.15*s);
    case 'cone': return new THREE.ConeGeometry(1.1*s, h, 20);
    // Wider than the previous pass (1.9 instead of 1.5) - still a tower,
    // not a squat block, but no longer a needle-thin pole.
    default: return new THREE.BoxGeometry(1.9*s, h, 1.9*s);
  }
}

// Baked facade textures: a dense window grid painted onto TWO aligned
// canvases - a diffuse/color map and a matching emissive map. Earlier
// version only tinted window color on one map, so lit windows never
// actually emitted light (flat, "didn't look good" against a dark scene).
// Now every lit window's pixels are also painted bright on a black
// emissive canvas, so it genuinely glows like Git City's skyline - dark
// windows stay pure black on the emissive map and contribute no light at
// all, which is what makes the lit ones pop by contrast.
function buildFacadeTexture(accentHex, h) {
  const texW = 256, texH = 512;

  // Fewer, larger windows than the previous pass (9 cols instead of 14,
  // a lower row-per-height multiplier) - the denser grid read as noisy
  // speckle up close instead of clean, legible windows.
  const rows = Math.max(12, Math.min(90, Math.round((h || 12) * 2.0)));
  const cols = 9;
  const cellW = texW / cols, cellH = texH / rows;

  // Roll every cell's state ONCE and reuse it for both canvases, so the
  // "glow" on the emissive map lines up pixel-for-pixel with the window
  // drawn on the color map.
  const bandRows = new Set();
  const bandCount = 1 + Math.floor(Math.random() * 2);
  for (let i = 0; i < bandCount; i++) bandRows.add(Math.floor(Math.random() * rows));

  const grid = [];
  for (let r = 0; r < rows; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) {
      if (bandRows.has(r)) { row.push('band'); continue; }
      const roll = Math.random();
      // ~58% of windows lit at rest - a lively, twinkling skyline.
      row.push(roll > 0.58 ? 'warm' : roll > 0.42 ? 'cool' : 'dark');
    }
    grid.push(row);
  }

  function paintWindows(ctx, emissivePass) {
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const state = grid[r][c];
        const pad = cellW * 0.07;
        const x = c * cellW + pad, y = r * cellH + cellH * 0.09;
        const wsz = cellW - 2 * pad, hsz = cellH * 0.82;
        if (!emissivePass) {
          ctx.fillStyle = state === 'band' ? accentHex
            : state === 'warm' ? '#caa568'
            : state === 'cool' ? '#6f93ad'
            : '#0a0e1c';
          ctx.fillRect(x, y, wsz, hsz);
        } else if (state !== 'dark') {
          // Bright window pixel + a soft blurred halo behind it, so each
          // lit window reads as a real light source (a cheap per-window
          // bloom) instead of a flat colored square.
          ctx.fillStyle = state === 'band' ? accentHex : state === 'warm' ? '#ffe2a6' : '#c7ecff';
          ctx.shadowColor = ctx.fillStyle;
          ctx.shadowBlur = cellW * 0.8;
          ctx.fillRect(x, y, wsz, hsz);
          ctx.shadowBlur = 0;
        }
      }
    }
  }

  // --- diffuse/color canvas ---
  const colorCanvas = document.createElement('canvas');
  colorCanvas.width = texW; colorCanvas.height = texH;
  const cctx = colorCanvas.getContext('2d');
  cctx.fillStyle = '#0c1120';
  cctx.fillRect(0, 0, texW, texH);
  cctx.strokeStyle = 'rgba(255,255,255,0.05)';
  for (let i = 1; i < 7; i++) {
    cctx.beginPath(); cctx.moveTo(i * texW / 7, 0); cctx.lineTo(i * texW / 7, texH); cctx.stroke();
  }
  cctx.strokeStyle = 'rgba(255,255,255,0.04)';
  for (let r = 1; r < rows; r++) {
    cctx.beginPath(); cctx.moveTo(0, r * cellH); cctx.lineTo(texW, r * cellH); cctx.stroke();
  }
  paintWindows(cctx, false);
  // grime/noise speckle so the facade reads as weathered, not a clean render
  cctx.globalAlpha = 0.08;
  cctx.fillStyle = '#000000';
  for (let i = 0; i < 420; i++) {
    cctx.fillRect(Math.random() * texW, Math.random() * texH, 1.5, 1.5);
  }
  cctx.globalAlpha = 1;

  // --- emissive canvas (black = no light, bright = a real glowing window) ---
  const emCanvas = document.createElement('canvas');
  emCanvas.width = texW; emCanvas.height = texH;
  const ectx = emCanvas.getContext('2d');
  ectx.fillStyle = '#000000';
  ectx.fillRect(0, 0, texW, texH);
  paintWindows(ectx, true);

  function toTexture(canvas) {
    const t = new THREE.CanvasTexture(canvas);
    t.wrapS = THREE.RepeatWrapping;
    t.wrapT = THREE.RepeatWrapping;
    // Nearest filtering keeps window edges crisp and blocky (Git City's
    // pixel-art look) instead of the soft blur mipmapping gives by default.
    t.magFilter = THREE.NearestFilter;
    t.minFilter = THREE.NearestFilter;
    return t;
  }

  return { colorMap: toTexture(colorCanvas), emissiveMap: toTexture(emCanvas) };
}

// Roof cap + rooftop greebles + base plinth. baseWidth/capWidth are now
// real width/diameter units (not the old 0.6-1.4 emotional scale factor),
// so these details stay properly proportioned now that towers are wider.
// A genuinely glowing neon trim strip wrapping the tower's SIDE faces right
// at the roofline (not the flat top cap plate itself) - unlit MeshBasicMaterial
// with additive blending so it reads as a true light source regardless of
// scene lighting, similar to the lit edge/rim trim in the reference shots.
function addNeonRoofTrim(parent, key, capWidth, h, accentColor) {
  const y = h / 2 - Math.max(0.06, capWidth * 0.015);
  const thick = Math.max(0.05, capWidth * 0.035);
  const trimMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(accentColor), transparent: true, opacity: 0.95,
    blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide,
  });

  if (key === 'cylinder') {
    const ringGeo = new THREE.TorusGeometry(capWidth * 0.5 * 0.98, thick * 0.5, 8, 28);
    const ring = new THREE.Mesh(ringGeo, trimMat);
    ring.rotation.x = Math.PI / 2;
    ring.position.y = y;
    parent.add(ring);
    return;
  }

  // Box tower: four thin glowing bars tracing the perimeter, just inset
  // from the corners so they read as a lit trim line, not a solid frame.
  const half = capWidth * 0.5 * 0.99;
  const lenGeo = new THREE.BoxGeometry(capWidth * 0.98, thick, thick);
  const depGeo = new THREE.BoxGeometry(thick, thick, capWidth * 0.98);
  const edges = [
    { geo: lenGeo, pos: [0, y, half] },
    { geo: lenGeo, pos: [0, y, -half] },
    { geo: depGeo, pos: [half, y, 0] },
    { geo: depGeo, pos: [-half, y, 0] },
  ];
  edges.forEach(e => {
    const bar = new THREE.Mesh(e.geo, trimMat);
    bar.position.set(e.pos[0], e.pos[1], e.pos[2]);
    parent.add(bar);
  });
}

function addRoofDetails(parent, key, baseWidth, capWidth, h, accentColor) {
  if (key === 'box' || key === 'cylinder') {
    const capGeo = key === 'box'
      ? new THREE.BoxGeometry(capWidth * 1.08, 0.18, capWidth * 1.08)
      : new THREE.CylinderGeometry(capWidth * 0.56, capWidth * 0.56, 0.18, 20);
    const capMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(accentColor), emissive: new THREE.Color(accentColor),
      emissiveIntensity: 0.5, roughness: 0.4, metalness: 0.5,
    });
    const cap = new THREE.Mesh(capGeo, capMat);
    cap.position.y = h / 2 + 0.09;
    cap.castShadow = true;
    parent.add(cap);

    addNeonRoofTrim(parent, key, capWidth, h, accentColor);

    // Rooftop greebles - small AC unit + water-tank silhouettes, the kind of
    // clutter that reads as "real building" from a distance.
    const greebleMat = new THREE.MeshStandardMaterial({ color: 0x555560, roughness: 0.7, metalness: 0.3 });
    if (Math.random() > 0.4) {
      const acUnit = new THREE.Mesh(new THREE.BoxGeometry(0.16 * capWidth, 0.22, 0.16 * capWidth), greebleMat);
      acUnit.position.set(0.22 * capWidth, h / 2 + 0.28, 0.16 * capWidth);
      acUnit.castShadow = true;
      parent.add(acUnit);
    }
    if (Math.random() > 0.55) {
      const tank = new THREE.Mesh(new THREE.CylinderGeometry(0.08 * capWidth, 0.08 * capWidth, 0.4, 10), greebleMat);
      tank.position.set(-0.18 * capWidth, h / 2 + 0.38, -0.13 * capWidth);
      tank.castShadow = true;
      parent.add(tank);
    }
    if (Math.random() > 0.5) {
      const antenna = new THREE.Mesh(
        new THREE.CylinderGeometry(0.02, 0.02, 0.28 * capWidth + 0.4, 6),
        new THREE.MeshStandardMaterial({ color: 0x888899, emissive: 0xff4444, emissiveIntensity: 0.3 })
      );
      antenna.position.y = h / 2 + 0.24 * capWidth + 0.3;
      parent.add(antenna);
    }
  }

  const plinthGeo = new THREE.CylinderGeometry(baseWidth * 0.6 + 0.3, baseWidth * 0.68 + 0.45, 0.22, 24);
  const plinthMat = new THREE.MeshStandardMaterial({ color: 0x14141c, roughness: 0.9 });
  const plinth = new THREE.Mesh(plinthGeo, plinthMat);
  plinth.position.y = -h / 2 - 0.1;
  plinth.receiveShadow = true;
  plinth.castShadow = true;
  parent.add(plinth);

  addRooftopBeam(parent, capWidth, h, accentColor);
  addGroundRing(parent, baseWidth, h, accentColor);
  addRoofOrb(parent, capWidth, h, accentColor);
  addEnergyLines(parent, key, baseWidth, h, accentColor);
  addRoofFlag(parent, capWidth, h, accentColor);
  addScanRing(parent, baseWidth, h, accentColor);
}

// The vertical "searchlight" shooting up from a rooftop into the sky - the
// signature Git City effect. Taller (deeper-memory) buildings get a
// taller, slightly brighter beam, so the effect itself carries meaning
// instead of being purely decorative. A thin bright inner core layered
// inside the soft outer beam gives it the denser, more substantial look
// from the reference instead of one flat translucent cone.
function addRooftopBeam(parent, capWidth, h, accentColor) {
  const beamHeight = Math.max(24, h * 1.6);

  const beamGeo = new THREE.CylinderGeometry(0.16 * capWidth + 0.14, 0.24 * capWidth + 0.22, beamHeight, 16, 1, true);
  const beamMat = new THREE.MeshBasicMaterial({
    map: beamTexture, color: new THREE.Color(accentColor),
    transparent: true, opacity: 0.85, depthWrite: false,
    blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
  });
  const beam = new THREE.Mesh(beamGeo, beamMat);
  beam.position.y = h / 2 + beamHeight / 2 + 0.15;
  parent.add(beam);

  const coreGeo = new THREE.CylinderGeometry(0.05 * capWidth + 0.06, 0.075 * capWidth + 0.09, beamHeight * 0.94, 12, 1, true);
  const coreMat = new THREE.MeshBasicMaterial({
    map: beamTexture, color: 0xffffff,
    transparent: true, opacity: 1.0, depthWrite: false,
    blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
  });
  const core = new THREE.Mesh(coreGeo, coreMat);
  core.position.y = beam.position.y;
  parent.add(core);

  return beam;
}

// Flat glowing ring(s) on the ground around the building's base - the
// "landing pad" halo visible around towers in the Git City screenshots.
// A wider soft outer ring plus a thin bright inner ring reads as more
// detailed/layered than a single flat ring.
// A glowing ring that wraps horizontally around a tower's body (not just
// sitting at the ground) and continuously travels from the base to the
// roof and back - the "laser ring around the building" effect, moving up
// and down on a loop rather than sitting still.
const scanRingEntries = [];
function addScanRing(parent, footprint, h, accentColor) {
  const ringRadius = footprint * 0.62 + 0.15;

  const geo = new THREE.TorusGeometry(ringRadius, 0.16, 10, 32);
  const mat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(accentColor), transparent: true, opacity: 0.9,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const ring = new THREE.Mesh(geo, mat);
  ring.rotation.x = Math.PI / 2; // lie flat so it encircles the vertical tower
  parent.add(ring);

  // Thin bright white core layered on top of the colored band, same trick
  // used on the rooftop beams - gives the ring a denser, hot-center glow
  // instead of one flat translucent color.
  const coreGeo = new THREE.TorusGeometry(ringRadius, 0.05, 8, 32);
  const coreMat = new THREE.MeshBasicMaterial({
    color: 0xffffff, transparent: true, opacity: 0.95,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const core = new THREE.Mesh(coreGeo, coreMat);
  core.rotation.x = Math.PI / 2;
  parent.add(core);

  scanRingEntries.push({ ring, core, h, phase: Math.random() * Math.PI * 2, speed: 0.35 + Math.random() * 0.25 });
}

const pulsingRingMaterials = [];
function addGroundRing(parent, baseWidth, h, accentColor) {
  // Clearance is measured against the plinth's own outer radius
  // (baseWidth * 0.68 + 0.45, see addRoofDetails) plus a safety margin,
  // so the ring always sits visibly outside the plinth instead of
  // clipping into it on wider towers.
  const inner = baseWidth * 0.75 + 0.9;

  const ringGeo = new THREE.RingGeometry(inner, inner + 0.22, 48);
  const ringMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(accentColor), transparent: true, opacity: 0.5,
    side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = -h / 2 - 0.09;
  parent.add(ring);
  pulsingRingMaterials.push({ mat: ringMat, base: 0.5, phase: Math.random() * Math.PI * 2 });

  const ring2Geo = new THREE.RingGeometry(Math.max(0.1, inner - 0.55), Math.max(0.14, inner - 0.4), 48);
  const ring2Mat = new THREE.MeshBasicMaterial({
    color: 0xffffff, transparent: true, opacity: 0.35,
    side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const ring2 = new THREE.Mesh(ring2Geo, ring2Mat);
  ring2.rotation.x = -Math.PI / 2;
  ring2.position.y = -h / 2 - 0.085;
  parent.add(ring2);
  pulsingRingMaterials.push({ mat: ring2Mat, base: 0.35, phase: Math.random() * Math.PI * 2 });

  return ring;
}

// A thin flagpole with a small pennant on some rooftops (roughly a third
// of towers, picked randomly per building) - the kind of skyline detail
// variety the Git City reference has, instead of every roof looking
// identical.
function addRoofFlag(parent, capWidth, h, accentColor) {
  if (Math.random() > 0.35) return;
  const poleH = 1.6 + Math.random() * 1.2;
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.03, 0.04, poleH, 6),
    new THREE.MeshStandardMaterial({ color: 0x9aa2ad, roughness: 0.5, metalness: 0.4 })
  );
  const offsetX = (Math.random() - 0.5) * capWidth * 0.5;
  const offsetZ = (Math.random() - 0.5) * capWidth * 0.5;
  pole.position.set(offsetX, h / 2 + poleH / 2, offsetZ);
  parent.add(pole);
  const flag = new THREE.Mesh(
    new THREE.PlaneGeometry(0.55, 0.32),
    new THREE.MeshBasicMaterial({ color: accentColor, side: THREE.DoubleSide })
  );
  flag.position.set(offsetX + 0.3, h / 2 + poleH - 0.15, offsetZ);
  parent.add(flag);
}

// Soft additive glow sprite - cheap stand-in for real bloom postprocessing
// (which would need extra CDN files we're deliberately avoiding). Sits
// behind each building's point light and fakes a light-bleed halo. Higher
// resolution + a sharper hot core than before for a more defined glow.
const glowTexture = (() => {
  const c = document.createElement('canvas');
  c.width = 160; c.height = 160;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(80, 80, 0, 80, 80, 80);
  g.addColorStop(0, 'rgba(255,255,255,1)');
  g.addColorStop(0.18, 'rgba(255,255,255,0.75)');
  g.addColorStop(0.45, 'rgba(255,255,255,0.22)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 160, 160);
  return new THREE.CanvasTexture(c);
})();

// Vertical fade texture for the rooftop light beams - the "searchlight
// shooting into the sky" effect from the Git City reference screenshots.
// Solid near the roof, fading to nothing higher up, with subtle vertical
// streaks baked in so the beam reads as a volumetric shaft with internal
// structure instead of one flat gradient smear.
const beamTexture = (() => {
  const c = document.createElement('canvas');
  c.width = 32; c.height = 320;
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0, 320, 0, 0);
  g.addColorStop(0, 'rgba(255,255,255,0.95)');
  g.addColorStop(0.3, 'rgba(255,255,255,0.5)');
  g.addColorStop(0.65, 'rgba(255,255,255,0.18)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 32, 320);
  ctx.globalCompositeOperation = 'multiply';
  for (let x = 0; x < 32; x++) {
    const shade = 0.72 + Math.random() * 0.28;
    ctx.fillStyle = 'rgba(255,255,255,' + shade + ')';
    ctx.fillRect(x, 0, 1, 320);
  }
  ctx.globalCompositeOperation = 'source-over';
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  return tex;
})();

// Vertical "data stream" texture for the sides of a tower - a handful of
// bright glowing lines against a transparent background, tiled vertically.
// In the animate loop we slide this texture's offset.y downward every
// frame, which makes the streaks themselves appear to travel UP the
// building (the "energy climbing the tower" look from the Git City
// reference). Kept as an overlay mesh slightly larger than the facade so
// it never z-fights with the window texture underneath.
const energyTexture = (() => {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 256;
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, 64, 256);
  const lineCount = 3 + Math.floor(Math.random() * 2);
  for (let i = 0; i < lineCount; i++) {
    const x = 6 + Math.random() * 52;
    const w = 1.4 + Math.random() * 2.2;
    const segH = 26 + Math.random() * 46;
    const y = Math.random() * 256;
    const grad = ctx.createLinearGradient(0, y, 0, y - segH);
    grad.addColorStop(0, 'rgba(255,255,255,0)');
    grad.addColorStop(0.5, 'rgba(255,255,255,0.9)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(x, y - segH, w, segH);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  return tex;
})();

// Every mesh/material pair registered here gets its texture offset nudged
// each animation frame - {mat, speed}, where speed's sign decides
// direction. Two layers per building (one positive, one negative speed)
// is what produces the "up AND down at once" flowing look.
const scrollingEnergyMaterials = [];

// Thin glowing vertical streak lines wrapped around a tower's sides,
// slightly outside the facade radius/width so they read as an energy
// skin climbing (and descending) the building rather than clipping into
// the windows. Two counter-scrolling layers, one nudged just outside the
// other, give a genuine two-way current instead of one flat direction.
function addEnergyLines(parent, key, footprint, h, accentColor) {
  function makeLayer(speed, radiusScale, tintColor, opacity) {
    const tex = energyTexture.clone();
    tex.needsUpdate = true;
    tex.repeat.set(key === 'cylinder' ? 3 : 4, Math.max(1, h / 10));
    const mat = new THREE.MeshBasicMaterial({
      map: tex, color: new THREE.Color(tintColor),
      transparent: true, opacity, depthWrite: false,
      blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
    });
    const geo = key === 'cylinder'
      ? new THREE.CylinderGeometry(footprint * 0.505 * radiusScale, footprint * 0.505 * radiusScale, h * 0.98, 20, 1, true)
      : new THREE.BoxGeometry(footprint * 1.012 * radiusScale, h * 0.98, footprint * 1.012 * radiusScale);
    const mesh = new THREE.Mesh(geo, mat);
    parent.add(mesh);
    scrollingEnergyMaterials.push({ mat, speed });
  }
  // Accent-colored streaks climbing up, plus a slightly larger, dimmer
  // white layer descending - reads as two independent currents rather
  // than one texture just reversing on itself.
  makeLayer(-0.012, 1.0, accentColor, 0.85);
  makeLayer(0.012, 1.015, 0xffffff, 0.5);
}

// The glowing orb/gem sitting on the rooftop, right where the searchlight
// beam begins - the "spherical tower cap" from the Git City reference. A
// solid glassy core plus a slightly larger wireframe shell around it so it
// reads as a faceted gem rather than a flat glowing ball, and it gets a
// gentle continuous spin in the animate loop.
function addRoofOrb(parent, capWidth, h, accentColor) {
  const orbRadius = Math.max(0.35, capWidth * 0.16);
  const coreMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(accentColor), emissive: new THREE.Color(accentColor),
    emissiveIntensity: 1.4, metalness: 0.2, roughness: 0.15, transparent: true, opacity: 0.9,
  });
  const core = new THREE.Mesh(new THREE.IcosahedronGeometry(orbRadius, 1), coreMat);
  core.position.y = h / 2 + orbRadius + 0.22;
  parent.add(core);

  const shellMat = new THREE.MeshBasicMaterial({
    color: 0xffffff, wireframe: true, transparent: true, opacity: 0.55,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const shell = new THREE.Mesh(new THREE.IcosahedronGeometry(orbRadius * 1.35, 1), shellMat);
  shell.position.copy(core.position);
  parent.add(shell);

  spinningOrbs.push({ core, shell });
  return core;
}

const spinningOrbs = [];

function addGlowSprite(position, color, scale) {
  const mat = new THREE.SpriteMaterial({
    map: glowTexture, color: new THREE.Color(color),
    transparent: true, opacity: 0.55, depthWrite: false, blending: THREE.AdditiveBlending,
  });
  const sprite = new THREE.Sprite(mat);
  sprite.position.copy(position);
  sprite.scale.set(scale, scale, 1);
  scene.add(sprite);
  return sprite;
}

// A tower's base width now scales with its own height on a gentle
// sqrt curve, decoupled from the narrow 0.6-1.4 emotional "scale" factor
// that used to be the ONLY thing driving width. That's what was producing
// ~90-unit-tall buildings only ~2.6 units wide (a flagpole, not a tower) -
// a shallow 12-unit memory now gets a solid ~6-7 unit base, and a deep,
// 90-unit memory gets a proper ~12-13 unit base, like real skyscrapers.
function footprintFor(s, h) {
  return (3.2 + Math.sqrt(Math.max(h, 1)) * 0.95) * s;
}

// Builds one building as a Group. Box/cylinder memories become a stepped,
// setback tower (a slender top tier on a wide base, wedding-cake style like
// real skyscrapers / GitCity's silhouettes) with a baked facade + emissive
// window texture on every tier. Landmark shapes (sphere, cone, torusKnot,
// etc, driven by objects like "bicycle" or "tree") stay as single
// sculptural forms - they're meant to read as monuments, not office towers.
function buildBuildingGroup(b, h) {
  const group = new THREE.Group();
  const key = b.geometry, s = b.scale, accent = b.accent;
  const isTiered = (key === 'box' || key === 'cylinder');
  const materials = [];

  if (!isTiered) {
    const geo = makeGeometry(key, s, h);
    const mat = new THREE.MeshStandardMaterial({
      color: 0xdfe6ee, emissive: new THREE.Color(accent), emissiveIntensity: 0.22,
      metalness: 0.3, roughness: 0.45, envMapIntensity: 0.8,
    });
    materials.push(mat);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.userData = b;
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    group.add(mesh);
    clickable.push(mesh);
    addRoofDetails(group, key, s * 2, s * 2, h, accent);
    return { group, materials };
  }

  const { colorMap, emissiveMap } = buildFacadeTexture(accent, h);
  // One wide base tier plus a slender setback top tier once a tower gets
  // tall enough - reads as a real skyscraper the taller it gets, instead
  // of visibly shrinking in several big wedding-cake steps.
  const footprint = footprintFor(s, h);
  const tierCount = h > 14 ? 2 : 1;
  const heightFracs = tierCount === 2 ? [0.82, 0.18] : [1.0];
  const widthFactor = 0.72;
  let cursorY = -h / 2;
  let topWidth = footprint;

  for (let i = 0; i < tierCount; i++) {
    const tierH = h * heightFracs[i];
    const tierWidth = footprint * Math.pow(widthFactor, i);
    topWidth = tierWidth;
    const geo = key === 'box'
      ? new THREE.BoxGeometry(tierWidth, tierH, tierWidth)
      : new THREE.CylinderGeometry(tierWidth * 0.5, tierWidth * 0.5, tierH, 20);
    const mat = new THREE.MeshStandardMaterial({
      map: colorMap, color: 0xffffff,
      emissive: new THREE.Color(0xffffff), emissiveMap: emissiveMap, emissiveIntensity: 1.15,
      metalness: 0.25, roughness: 0.5, envMapIntensity: 0.8,
    });
    materials.push(mat);
    const tierMesh = new THREE.Mesh(geo, mat);
    tierMesh.position.y = cursorY + tierH / 2;
    tierMesh.userData = b;
    tierMesh.castShadow = true;
    tierMesh.receiveShadow = true;
    group.add(tierMesh);
    clickable.push(tierMesh);
    cursorY += tierH;
  }

  addRoofDetails(group, key, footprint, topWidth, h, accent);
  return { group, materials };
}

const clickable = [];
const raycaster = new THREE.Raycaster();
const labelEl = document.getElementById('label');

const maxRadius = BUILDINGS.reduce((m, b) => Math.max(m, Math.hypot(b.position.x, b.position.z)), 0);
const maxHeight = BUILDINGS.reduce((m, b) => Math.max(m, b.height || 2.5), 0);
const OVERVIEW_DISTANCE = Math.max(24, maxRadius * 1.6 + 14, maxHeight * 1.4 + 18);
camDistance = OVERVIEW_DISTANCE;
camDistanceGoal = OVERVIEW_DISTANCE;
camPhi = camPhiGoal = 0.85;

const buildingRegistry = {};

BUILDINGS.forEach(b => {

});

// Ambient drifting light motes scattered across the whole city footprint -
// tiny colorful specks (warm gold + a few magenta/cyan accents, echoing
// the little glints scattered across facades in the reference) that drift
// slowly upward. Purely decorative texture/detail, cheap to render as one
// particle system rather than per-building effects.
{
  const moteCount = 260;
  const spread = Math.max(30, maxRadius * 1.3 + 10);
  const positions = new Float32Array(moteCount * 3);
  const colors = new Float32Array(moteCount * 3);
  const speeds = new Float32Array(moteCount);
  const moteColors = [0xffd27a, 0xff8fd6, 0x7fe0ff, 0xfff2c2];
  const tmpColor = new THREE.Color();
  for (let i = 0; i < moteCount; i++) {
    const ang = Math.random() * Math.PI * 2;
    const rad = Math.random() * spread;
    positions[i*3] = Math.cos(ang) * rad;
    positions[i*3+1] = Math.random() * Math.max(20, maxHeight * 0.9);
    positions[i*3+2] = Math.sin(ang) * rad;
    tmpColor.set(moteColors[Math.floor(Math.random() * moteColors.length)]);
    colors[i*3] = tmpColor.r; colors[i*3+1] = tmpColor.g; colors[i*3+2] = tmpColor.b;
    speeds[i] = 0.15 + Math.random() * 0.35;
  }
  const moteGeo = new THREE.BufferGeometry();
  moteGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

// ============================================================
// WORLD DRESSING - mountains, a fixed shopping mall landmark, street
// lamps, a park, a lake, and a ring road with moving cars. All sized off
// worldEdge so they scale sensibly whether the city has 3 buildings or
// 300, and placed at fixed angles around the outside of the tower cluster
// so they never overlap the memory towers themselves.
// ============================================================
const worldEdge = Math.max(maxRadius, 20);

// ---- MOUNTAINS: a jagged, low-poly range on ONE side of the city only
// (behind the waterfall/lake), pushed well out into the fog so they read
// as a distant backdrop instead of a close ring that clips into the
// scene - flat-shaded cones with a lighter snow-cap cone on each peak. ----
// ---- PLATEAUS: broad, flat-topped mesas instead of pointed peaks - meant
// to read as an inviting scenic destination (somewhere people would hike
// up to) rather than a sheer, unclimbable mountain. Each one gets a green
// terrace near the base, a switchback trail of glowing dashes climbing
// the side, and a small lookout flag planted on the flat top. ----
// A little car that climbs a plateau's road, separate from the main
// road-loop cars since it follows a fixed set of waypoints instead of a
// circle.
const plateauCars = [];
function buildSmallPlateauCar(color) {
  const car = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.28, 0.46), new THREE.MeshStandardMaterial({ color, roughness: 0.4, metalness: 0.5 }));
  body.position.y = 0.2;
  car.add(body);
  const cabin = new THREE.Mesh(new THREE.BoxGeometry(0.44, 0.2, 0.4), new THREE.MeshStandardMaterial({ color: 0x11141c }));
  cabin.position.set(-0.04, 0.39, 0);
  car.add(cabin);
  const headlight = new THREE.Mesh(new THREE.SphereGeometry(0.05, 6, 6), new THREE.MeshBasicMaterial({ color: 0xfff2c0 }));
  headlight.position.set(0.42, 0.2, 0);
  car.add(headlight);
  return car;
}

function buildPlateauRange(radius, centerAngle, arcSpread, count) {
  const group = new THREE.Group();
  for (let i = 0; i < count; i++) {
    const ang = centerAngle + (Math.random() - 0.5) * arcSpread;
    const dist = radius + Math.random() * radius * 0.3;
    const baseRadius = 26 + Math.random() * 20;
    const plateauHeight = 34 + Math.random() * 26;
    const topRadius = baseRadius * (0.6 + Math.random() * 0.12);
    const sides = 6;
    const rotY = Math.random() * Math.PI * 2;
    const px = Math.cos(ang) * dist, pz = Math.sin(ang) * dist;
    const baseY = plateauHeight / 2 - 3;

    const bodyGeo = new THREE.CylinderGeometry(topRadius, baseRadius, plateauHeight, sides);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x394258, flatShading: true, roughness: 0.95 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.rotation.y = rotY;
    body.position.set(px, baseY, pz);
    body.receiveShadow = true;
    group.add(body);

    // Green terrace band near the base, like real mesas greening lower down.
    const terraceH = plateauHeight * 0.18;
    const terrace = new THREE.Mesh(
      new THREE.CylinderGeometry(baseRadius * 0.9, baseRadius * 1.0, terraceH, sides),
      new THREE.MeshStandardMaterial({ color: 0x2c4a30, flatShading: true, roughness: 1 })
    );
    terrace.rotation.y = rotY;
    terrace.position.set(px, baseY - plateauHeight / 2 + terraceH / 2 + 1, pz);
    group.add(terrace);

    // Grassy summit instead of bare rock - a peaceful spot to land on top
    // of, not just a functional peak.
    const capY = baseY + plateauHeight / 2 + 0.6;
    const cap = new THREE.Mesh(
      new THREE.CylinderGeometry(topRadius, topRadius, 1.4, sides),
      new THREE.MeshStandardMaterial({ color: 0x4a7a4e, flatShading: true, roughness: 0.85 })
    );
    cap.rotation.y = rotY;
    cap.position.set(px, capY, pz);
    group.add(cap);

    // A handful of low-poly trees and a bench up top - the "relax" feel.
    const grassY = capY + 0.7;
    for (let k = 0; k < 5; k++) {
      const tAng = Math.random() * Math.PI * 2;
      const tRad = Math.random() * topRadius * 0.7;
      const tx = px + Math.cos(tAng) * tRad, tz = pz + Math.sin(tAng) * tRad;
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.12, 1.0, 6), new THREE.MeshStandardMaterial({ color: 0x4a3524, roughness: 0.9 }));
      trunk.position.set(tx, grassY + 0.5, tz);
      group.add(trunk);
      const leaf = new THREE.Mesh(new THREE.ConeGeometry(0.75, 1.6, 7), new THREE.MeshStandardMaterial({ color: 0x1f4a2e, emissive: 0x0d2415, emissiveIntensity: 0.3, flatShading: true, roughness: 0.85 }));
      leaf.position.set(tx, grassY + 1.5, tz);
      group.add(leaf);
    }
    const bench = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.15, 0.4), new THREE.MeshStandardMaterial({ color: 0x6b4a2f, roughness: 0.8 }));
    bench.position.set(px + topRadius * 0.35, grassY + 0.25, pz);
    group.add(bench);

    // A real road (not just decorative dashes) winding up the side - wide
    // enough to read as drivable, with a painted centerline - and a little
    // car climbing it on a loop.
    const roadPoints = [];
    const roadSteps = 22;
    for (let t = 0; t <= roadSteps; t++) {
      const tProg = t / roadSteps;
      const ry = baseY - plateauHeight / 2 + tProg * plateauHeight;
      const rr = baseRadius - tProg * (baseRadius - topRadius) + 0.6;
      const rAng = rotY + tProg * Math.PI * 1.4;
      const rx = px + Math.cos(rAng) * rr, rz = pz + Math.sin(rAng) * rr;
      roadPoints.push(new THREE.Vector3(rx, ry + 0.15, rz));
      if (t < roadSteps) {
        const seg = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.16, 1.4), new THREE.MeshStandardMaterial({ color: 0x2c2e34, roughness: 0.95 }));
        seg.position.set(rx, ry, rz);
        seg.rotation.y = rAng;
        group.add(seg);
        const stripe = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.17, 0.12), new THREE.MeshBasicMaterial({ color: 0xffe9a8, transparent: true, opacity: 0.5 }));
        stripe.position.set(rx, ry + 0.01, rz);
        stripe.rotation.y = rAng;
        group.add(stripe);
      }
    }
    const plateauCar = buildSmallPlateauCar(i % 2 === 0 ? 0xff5b5b : 0x5bb3ff);
    group.add(plateauCar);
    plateauCars.push({ car: plateauCar, points: roadPoints, t: Math.random(), speed: 0.05 + Math.random() * 0.025 });

    // A small lookout flag on top marking it as a place worth visiting.
    const pole = new THREE.Mesh(
      new THREE.CylinderGeometry(0.12, 0.12, 3, 6),
      new THREE.MeshStandardMaterial({ color: 0x8a8f9a, roughness: 0.5, metalness: 0.4 })
    );
    pole.position.set(px, capY + 2.2, pz);
    group.add(pole);
    const flag = new THREE.Mesh(new THREE.PlaneGeometry(1.4, 0.8), new THREE.MeshBasicMaterial({ color: 0xff5f5f, side: THREE.DoubleSide }));
    flag.position.set(px + 0.75, pole.position.y + 1.1, pz);
    group.add(flag);
  }
  scene.add(group);
}
// A fixed minimum distance (not just worldEdge-scaled) keeps them far away
// even for a small city with only a handful of buildings - centered on the
// same angle as the waterfall/lake (4.4) with a 55-degree-wide arc, so
// they form one distant backdrop instead of surrounding the whole scene.
// NOTE: scene.fog is FogExp2 with density 0.013 - its squared falloff means
// anything past ~100 units is already fogged to fully invisible. Capped
// here so they always land in the "distant but visible" zone.
// Mountain/plateau range removed per request - function kept unused above
// in case it's wanted again later, but no longer invoked.

// ---- SHOPPING MALL: a fixed landmark (not tied to any memory) - a wide
// glassy box with a baked neon "MALL" marquee sign, entrance canopy, and
// its own ground glow ring. ----
function buildShoppingMall(x, z) {
  const group = new THREE.Group();
  const width = 16, depth = 9, height = 7;

  const texW = 256, texH = 128;
  const canvas = document.createElement('canvas');
  canvas.width = texW; canvas.height = texH;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0d2436';
  ctx.fillRect(0, 0, texW, texH);
  const cols = 12, rows = 4;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      ctx.fillStyle = Math.random() > 0.25 ? '#7fe3ff' : '#123246';
      ctx.fillRect(c * (texW / cols) + 2, r * (texH / rows) + 2, texW / cols - 4, texH / rows - 4);
    }
  }
  const facadeTex = new THREE.CanvasTexture(canvas);
  facadeTex.wrapS = THREE.RepeatWrapping;
  facadeTex.wrapT = THREE.RepeatWrapping;

  const bodyMat = new THREE.MeshStandardMaterial({
    map: facadeTex, color: 0xffffff, emissive: 0x2ce0ff, emissiveMap: facadeTex,
    emissiveIntensity: 0.9, roughness: 0.25, metalness: 0.5,
  });
  const body = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), bodyMat);
  body.position.y = height / 2;
  body.castShadow = true;
  body.receiveShadow = true;
  group.add(body);

  const signCanvas = document.createElement('canvas');
  signCanvas.width = 512; signCanvas.height = 128;
  const sctx = signCanvas.getContext('2d');
  sctx.fillStyle = '#050b12';
  sctx.fillRect(0, 0, 512, 128);
  sctx.font = 'bold 76px sans-serif';
  sctx.fillStyle = '#ff5fd1';
  sctx.textAlign = 'center';
  sctx.textBaseline = 'middle';
  sctx.shadowColor = '#ff5fd1';
  sctx.shadowBlur = 30;
  sctx.fillText('MALL', 256, 68);
  const signTex = new THREE.CanvasTexture(signCanvas);
  const signMat = new THREE.MeshBasicMaterial({ map: signTex, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
  const sign = new THREE.Mesh(new THREE.PlaneGeometry(9, 2.2), signMat);
  sign.position.set(0, height + 1.3, depth / 2 + 0.05);
  group.add(sign);

  const canopyMat = new THREE.MeshStandardMaterial({ color: 0x0e1720, emissive: 0x2ce0ff, emissiveIntensity: 0.5, transparent: true, opacity: 0.55 });
  const canopy = new THREE.Mesh(new THREE.BoxGeometry(6, 0.3, 2.4), canopyMat);
  canopy.position.set(0, 2.6, depth / 2 + 1.3);
  group.add(canopy);

  const ringMat = new THREE.MeshBasicMaterial({
    color: 0x2ce0ff, transparent: true, opacity: 0.45,
    side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const ring = new THREE.Mesh(new THREE.RingGeometry(width * 0.55, width * 0.55 + 1.2, 48), ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.05;
  group.add(ring);

  group.position.set(x, 0, z);
  scene.add(group);
}
buildShoppingMall(Math.cos(0.0) * (worldEdge + 14), Math.sin(0.0) * (worldEdge + 14));

// ---- STREET LAMPS: warm little lamp-posts on two rings through the
// city, each with its own soft point light + glow sprite. ----
function addStreetLamp(x, z, facingAngle) {
  const group = new THREE.Group();
  const poleH = 3.2;
  const poleMat = new THREE.MeshStandardMaterial({ color: 0x2a2e38, roughness: 0.6, metalness: 0.4 });
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.07, poleH, 8), poleMat);
  pole.position.y = poleH / 2;
  pole.castShadow = true;
  group.add(pole);

  const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.5, 6), poleMat);
  arm.rotation.z = Math.PI / 2;
  arm.position.set(0.25, poleH - 0.1, 0);
  group.add(arm);

  const lampMat = new THREE.MeshStandardMaterial({ color: 0xffdca0, emissive: 0xffc873, emissiveIntensity: 1.6, roughness: 0.3 });
  const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.14, 10, 8), lampMat);
  lamp.position.set(0.5, poleH - 0.1, 0);
  group.add(lamp);

  const light = new THREE.PointLight(0xffc873, 0.55, 6);
  light.position.copy(lamp.position);
  group.add(light);

  // Rotate the whole lamp so its arm/head faces the city center rather than
  // a fixed world direction - without this every lamp on the far side of
  // the ring had its lit head pointing away from the road.
  group.rotation.y = facingAngle;
  group.position.set(x, 0, z);
  scene.add(group);

  const worldOffsetX = lamp.position.x * Math.cos(facingAngle);
  const worldOffsetZ = -lamp.position.x * Math.sin(facingAngle);
  addGlowSprite(new THREE.Vector3(x + worldOffsetX, lamp.position.y, z + worldOffsetZ), 0xffc873, 1.3);
}

// Street lamp placement removed per request (assumed to be the "traffic
// light" objects referred to - the glowing orbs on poles along the road).
// addStreetLamp() is kept defined above, unused, in case it's wanted back.

// ---- PARK: a grove of low-poly pine trees on a lawn patch, using
// InstancedMesh so the whole grove is only two draw calls. ----
function buildPark(centerX, centerZ, spread, count) {
  const trunkGeo = new THREE.CylinderGeometry(0.12, 0.16, 1.4, 6);
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4a3524, roughness: 0.9 });
  const trunkMesh = new THREE.InstancedMesh(trunkGeo, trunkMat, count);

  const canopyGeo = new THREE.ConeGeometry(1.0, 2.2, 7);
  const canopyMat = new THREE.MeshStandardMaterial({ color: 0x1f4a2e, emissive: 0x0d2415, emissiveIntensity: 0.4, roughness: 0.85, flatShading: true });
  const canopyMesh = new THREE.InstancedMesh(canopyGeo, canopyMat, count);

  const dummy = new THREE.Object3D();
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2;
    const r = Math.sqrt(Math.random()) * spread;
    const x = centerX + Math.cos(ang) * r;
    const z = centerZ + Math.sin(ang) * r;
    const scale = 0.7 + Math.random() * 0.7;

    dummy.position.set(x, 0.7 * scale, z);
    dummy.scale.set(scale, scale, scale);
    dummy.rotation.y = Math.random() * Math.PI * 2;
    dummy.updateMatrix();
    trunkMesh.setMatrixAt(i, dummy.matrix);

    dummy.position.set(x, (1.4 + 1.1) * scale, z);
    dummy.updateMatrix();
    canopyMesh.setMatrixAt(i, dummy.matrix);
  }
  trunkMesh.castShadow = true;
  canopyMesh.castShadow = true;
  scene.add(trunkMesh);
  scene.add(canopyMesh);

  const lawn = new THREE.Mesh(
    new THREE.CircleGeometry(spread + 3, 32),
    new THREE.MeshStandardMaterial({ color: 0x122a1a, roughness: 1 })
  );
  lawn.rotation.x = -Math.PI / 2;
  lawn.position.set(centerX, 0.01, centerZ);
  lawn.receiveShadow = true;
  scene.add(lawn);
}
buildPark(Math.cos(2.3) * (worldEdge + 15), Math.sin(2.3) * (worldEdge + 15), 12, 40);

// ---- LAKE: a calm reflective disc with a faint animated ripple (its
// texture offset drifts slowly every frame, see animate()). ----
const lakeRippleTexture = (() => {
  const c = document.createElement('canvas');
  c.width = 128; c.height = 128;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#0a2a3a';
  ctx.fillRect(0, 0, 128, 128);
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  for (let i = 0; i < 10; i++) {
    ctx.beginPath();
    ctx.arc(Math.random() * 128, Math.random() * 128, 10 + Math.random() * 30, 0, Math.PI * 2);
    ctx.stroke();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(4, 4);
  return tex;
})();

let lakeMaterial = null;
function buildLake(x, z, radius) {
  lakeMaterial = new THREE.MeshStandardMaterial({
    map: lakeRippleTexture, color: 0x3a7ca8, roughness: 0.15, metalness: 0.6,
    emissive: 0x0c2636, emissiveIntensity: 0.3,
  });
  const lake = new THREE.Mesh(new THREE.CircleGeometry(radius, 48), lakeMaterial);
  lake.rotation.x = -Math.PI / 2;
  lake.position.set(x, 0.02, z);
  lake.receiveShadow = true;
  scene.add(lake);

  const shore = new THREE.Mesh(
    new THREE.RingGeometry(radius, radius + 2.4, 48),
    new THREE.MeshStandardMaterial({ color: 0x1c2718, roughness: 1 })
  );
  shore.rotation.x = -Math.PI / 2;
  shore.position.set(x, 0.015, z);
  scene.add(shore);
}
buildLake(Math.cos(4.4) * (worldEdge + 16), Math.sin(4.4) * (worldEdge + 16), 9);

// ---- WATERFALL: a rock cliff just behind the lake, with water cascading
// down its face and a small road bridge (with guardrail) crossing right
// at its base - the mountain/waterfall/lake/road composition from the
// reference photo. Built facing the origin via lookAt() so the falls
// always pour toward the lake regardless of which angle they're placed at. ----
const waterfallMaterials = [];
function buildWaterfall(x, z, cliffHeight) {
  const group = new THREE.Group();

  const cliffMat = new THREE.MeshStandardMaterial({ color: 0x2b2f38, roughness: 1, flatShading: true });
  const cliff = new THREE.Mesh(new THREE.ConeGeometry(22, cliffHeight, 5), cliffMat);
  cliff.position.y = cliffHeight / 2 - 3;
  cliff.receiveShadow = true;
  group.add(cliff);

  const capMat = new THREE.MeshStandardMaterial({ color: 0x24422b, roughness: 0.9, flatShading: true });
  const cap = new THREE.Mesh(new THREE.ConeGeometry(9, cliffHeight * 0.22, 5), capMat);
  cap.position.y = cliffHeight - 3 - cliffHeight * 0.11;
  group.add(cap);

  // Falling water - vertical white streaks tiled and scrolled downward
  // every frame (see animate()), on a plane facing the lake.
  const fallTex = (() => {
    const c = document.createElement('canvas');
    c.width = 32; c.height = 256;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, 32, 256);
    for (let i = 0; i < 40; i++) {
      const px = Math.random() * 32;
      const segH = 20 + Math.random() * 80;
      const y = Math.random() * 256;
      const grad = ctx.createLinearGradient(0, y, 0, y + segH);
      grad.addColorStop(0, 'rgba(255,255,255,0)');
      grad.addColorStop(0.5, 'rgba(255,255,255,0.85)');
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(px, y, 1.4 + Math.random() * 1.6, segH);
    }
    const t = new THREE.CanvasTexture(c);
    t.wrapS = THREE.RepeatWrapping;
    t.wrapT = THREE.RepeatWrapping;
    t.repeat.set(4, 3);
    return t;

function buildRingRoad(radius) {
  const roadMat = new THREE.MeshStandardMaterial({ color: 0x1a1c22, roughness: 0.95 });
  const road = new THREE.Mesh(new THREE.RingGeometry(radius - 1.6, radius + 1.6, 96), roadMat);
  road.rotation.x = -Math.PI / 2;
  road.position.y = 0.03;
  road.receiveShadow = true;
  scene.add(road);

  const dashMat = new THREE.MeshBasicMaterial({ color: 0xffe9a8, transparent: true, opacity: 0.55 });
  const dashCount = 90;
  for (let i = 0; i < dashCount; i++) {
    if (i % 2 === 0) continue;
    const ang = (i / dashCount) * Math.PI * 2;
    const dash = new THREE.Mesh(new THREE.PlaneGeometry(0.9, 0.16), dashMat);
    dash.rotation.x = -Math.PI / 2;
    dash.rotation.z = ang + Math.PI / 2;
    dash.position.set(Math.cos(ang) * radius, 0.04, Math.sin(ang) * radius);
    scene.add(dash);

}

// ---- HOT AIR BALLOONS: drift through the sky on the same kind of looping
// path as the road cars, just up at altitude instead of on the ground.
// Envelope uses a baked vertical-gore-stripe texture (alternating colors
// running pole-to-pole) rather than lit materials, so it reads clearly as
// a classic striped balloon in both day and night mode. ----
function hexToCss(hexNum) {
  return '#' + hexNum.toString(16).padStart(6, '0');
}

function buildBalloonEnvelopeTexture(colorA, colorB) {
  const w = 128, h = 16;
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const gores = 10;
  const cssA = hexToCss(colorA), cssB = hexToCss(colorB);
  for (let i = 0; i < gores; i++) {
    ctx.fillStyle = i % 2 === 0 ? cssA : cssB;
    ctx.fillRect((i / gores) * w, 0, w / gores + 1, h);
  }
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  return tex;
}

// Selecting a building boosts its own glow (facade emissive, point light,
// halo sprite) well above the resting city glow, then reverts the previous
// selection back to its dim resting state - so only the tapped building
// "lights up" instead of the whole skyline looking uniformly bright.
let selectedIndex = null;

function clearHighlight(idx) {
  const reg = buildingRegistry[idx];
  if (!reg) return;
  reg.materials.forEach((m, i) => { m.emissiveIntensity = reg.baseEmissive[i]; });
  reg.light.intensity = reg.baseLightIntensity;
  reg.sprite.material.opacity = reg.baseSpriteOpacity;
  reg.sprite.scale.set(reg.baseSpriteScale, reg.baseSpriteScale, 1);
}

function applyHighlight(idx) {
  const reg = buildingRegistry[idx];
  if (!reg) return;
  reg.materials.forEach((m, i) => { m.emissiveIntensity = reg.baseEmissive[i] + 0.3; });
  reg.light.intensity = reg.baseLightIntensity * 4.0;
  reg.sprite.material.opacity = 0.85;
  reg.sprite.scale.set(reg.baseSpriteScale * 1.5, reg.baseSpriteScale * 1.5, 1);
}

function setSelected(idx) {
  if (selectedIndex !== null && selectedIndex !== idx) clearHighlight(selectedIndex);
  selectedIndex = idx;

}

// Samples a canvas-rendered string into a set of 2D points (local plane
// coordinates, centered on origin, y-up) wherever the text is opaque.
// Used to give firework particles an actual shape to converge into instead
// of just dispersing randomly.
function sampleTextPoints(text, maxPoints) {
  const fontSize = 44;
  const measureCanvas = document.createElement('canvas');
  const mctx = measureCanvas.getContext('2d');
  mctx.font = 'bold ' + fontSize + 'px sans-serif';
  const textWidthPx = Math.ceil(mctx.measureText(text).width) + 24;

  const canvas = document.createElement('canvas');
  canvas.width = Math.max(64, textWidthPx);
  canvas.height = Math.round(fontSize * 1.6);
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + fontSize + 'px sans-serif';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillText(text, 12, canvas.height / 2);

  const img = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
  const pts = [];
  const step = 3;
  for (let y = 0; y < canvas.height; y += step) {
    for (let x = 0; x < canvas.width; x += step) {
      const idx = (y * canvas.width + x) * 4;
      if (img[idx] > 128) {
        pts.push([x - canvas.width / 2, -(y - canvas.height / 2)]);
      }
    }
  }
  if (pts.length > maxPoints) {
    const stride = pts.length / maxPoints;
    const sampled = [];
    for (let i = 0; i < maxPoints; i++) sampled.push(pts[Math.floor(i * stride)]);
    return { points: sampled, width: canvas.width };
  }
  return { points: pts, width: canvas.width };
}

// Particles start scattered near the burst point, then converge into the
// sampled text shape, hold long enough to actually read, then fade. The
// shape is billboarded every frame using the camera's own right/up vectors
// so it stays readable even if the camera keeps moving during the hold.
const fireworkTexts = [];
function spawnFireworkText(originPos, text, color) {
  const { points, width } = sampleTextPoints(text, 200);
  if (points.length === 0) return;
  const desiredWidth = Math.min(11, Math.max(4, text.length * 0.3));
  const scale = desiredWidth / width;
  const count = points.length;

  const startLocal = new Float32Array(count * 2);
  const targetLocal = new Float32Array(count * 2);
  for (let i = 0; i < count; i++) {
    targetLocal[i * 2] = points[i][0] * scale;
    targetLocal[i * 2 + 1] = points[i][1] * scale;
    const ang = Math.random() * Math.PI * 2;
    const r = 1.2 + Math.random() * 2.2;
    startLocal[i * 2] = Math.cos(ang) * r;
    startLocal[i * 2 + 1] = Math.sin(ang) * r;
  }

  const positions = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    positions[i * 3] = originPos.x;
    positions[i * 3 + 1] = originPos.y;
    positions[i * 3 + 2] = originPos.z;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({
    color: new THREE.Color(color), size: 0.15, transparent: true, opacity: 0,
    depthWrite: false, blending: THREE.AdditiveBlending, sizeAttenuation: true,
  });
  const pts = new THREE.Points(geo, mat);
  scene.add(pts);

  fireworkTexts.push({
    points: pts, origin: originPos.clone(), startLocal, targetLocal, count,
    start: performance.now(), convergeDur: 700, holdDur: 1400, fadeDur: 500,
  });
}

// Firework celebration - launched when a building is tapped. A rocket
// sprite rises from the building's base to just above its roof, then bursts
// into a colored particle explosion (tinted to the memory's emotion accent)
// timed with the memory label appearing. True particle-formed text isn't
// realistic in plain Three.js without a dedicated text-particle library, so
// this keeps to what's actually reliable: rocket -> burst -> label, all in
// the same moment, so it reads as "the memory is revealed by the firework."
const fireworkRockets = [];
const fireworkBursts = [];

function spawnFireworkRocket(fromPos, toPos, color, text) {
  const mat = new THREE.SpriteMaterial({
    map: glowTexture, color: new THREE.Color(color),
    transparent: true, opacity: 0.95, depthWrite: false, blending: THREE.AdditiveBlending,
  });

  sprite.scale.set(0.5, 0.5, 1);

  scene.add(sprite);

function spawnFireworkBurst(position, color) {
  const count = 48;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const velocities = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    positions[i * 3] = position.x;
    positions[i * 3 + 1] = position.y;
    positions[i * 3 + 2] = position.z;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(Math.random() * 2 - 1);
    const speed = 3.2 + Math.random() * 2.4;
    velocities[i * 3] = Math.sin(phi) * Math.cos(theta) * speed;
    velocities[i * 3 + 1] = Math.cos(phi) * speed * 0.9 + 0.8;
    velocities[i * 3 + 2] = Math.sin(phi) * Math.sin(theta) * speed;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({
    color: new THREE.Color(color), size: 0.22, transparent: true, opacity: 1,
    depthWrite: false, blending: THREE.AdditiveBlending, sizeAttenuation: true,
  });
  const points = new THREE.Points(geo, mat);
  scene.add(points);
  fireworkBursts.push({ points, velocities, start: performance.now(), duration: 1200 });
}
