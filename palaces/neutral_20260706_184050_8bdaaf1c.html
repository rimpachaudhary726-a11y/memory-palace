
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memory Palace - neutral Palace</title>
<style>body { margin:0; overflow:hidden; }</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
<script>
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2({
    color: new THREE.Color(0),
    near: 1, far: 1000
});

const ambientLight = new THREE.AmbientLight(4210752, 0.8);
scene.add(ambientLight);
const pointLight = new THREE.PointLight(16777215, 0.8);
pointLight.position.set(5,5,5);
scene.add(pointLight);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.5, 3);
const renderer = new THREE.WebGLRenderer({ alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

let geometry;
if ('box' === 'box') {
    geometry = new THREE.BoxGeometry(0.8*2, 0.8*2, 0.8*2);
} else if ('box' === 'sphere') {
    geometry = new THREE.SphereGeometry(0.8, 12, 8);
} else if ('box' === 'torusKnot') {
    geometry = new THREE.TorusKnotGeometry(0.8*0.5, 0.8*0.3, 12, 8);
} else {
    geometry = new THREE.BoxGeometry(0.8*2, 0.8*2, 0.8*2);
}
const material = new THREE.MeshStandardMaterial({
    color: new THREE.Color('#9E9E9E'),
    metalness: 0.8,
    roughness: 0.2
});
const cube = new THREE.Mesh(geometry, material);
scene.add(cube);

const light = new THREE.PointLight(0xffffff, 0.6);
light.position.set(4,5,5);
scene.add(light);

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
